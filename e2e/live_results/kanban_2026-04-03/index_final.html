/* ============================================================
   JS — Stats Panel
   ============================================================ */
document.getElementById('btn-stats').addEventListener('click', () => {
  const panel = document.getElementById('stats-panel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) Render.stats();
});

document.getElementById('stats-close').addEventListener('click', () => {
  document.getElementById('stats-panel').classList.remove('active');
});

/* ============================================================
   JS — Export
   ============================================================ */
document.getElementById('btn-export').addEventListener('click', () => {
  const exportData = Utils.cloneState(state);
  delete exportData.ui;
  delete exportData.selection;
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `kanban-export-${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Board exporté !');
});

/* ============================================================
   JS — Import
   ============================================================ */
document.getElementById('btn-import-trigger').addEventListener('click', () => {
  document.getElementById('import-input').click();
});

document.getElementById('import-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const validation = validateImportSchema(data);
      if (!validation.valid) {
        showToast('Import invalide: ' + validation.errors[0]);
        return;
      }
      confirmAction('Importer ce fichier ? L\'état actuel sera remplacé.', () => {
        const backup = Utils.cloneState(state);
        try {
          dispatch('IMPORT_STATE', { columns: data.columns, tasks: data.tasks, theme: data.theme, version: data.version });
          Storage.save(true);
          showToast('Import réussi !');
        } catch (err) {
          state = normalizeState(backup);
          state.selection = { taskIds: [], mode: false };
          state.ui = { selectedTaskId: null, modalOpen: false };
          editingInline = null;
          Storage.save(true);
          Render.all();
          showToast('Erreur lors de l\'import, rollback effectué');
        }
      });
    } catch(err) {
      showToast('Fichier JSON invalide');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function validateImportSchema(data) {
  const errors = [];
  const safeIdPattern = /^[A-Za-z0-9_-]+$/;
  if (!data || typeof data !== 'object' || Array.isArray(data)) errors.push('Format invalide');
  if (!Number.isInteger(data.version) || data.version < 1) errors.push('version manquante ou invalide');
  if (!Array.isArray(data.columns) || !data.columns.length) errors.push('columns manquant ou invalide');
  if (!Array.isArray(data.tasks)) errors.push('tasks manquant ou invalide');
  if (errors.length) return { valid: false, errors };

  const colIds = new Set();
  data.columns.forEach((c, i) => {
    if (!c || typeof c !== 'object' || Array.isArray(c)) {
      errors.push(`Colonne ${i}: format invalide`);
      return;
    }
    if (typeof c.id !== 'string' || !c.id) errors.push(`Colonne ${i}: id manquant`);
    if (typeof c.id === 'string' && !safeIdPattern.test(c.id)) errors.push(`Colonne ${i}: id invalide`);
    if (typeof c.title !== 'string' || !c.title.trim()) errors.push(`Colonne ${i}: title manquant`);
    if (!Number.isFinite(c.order)) errors.push(`Colonne ${i}: order invalide`);
    if (colIds.has(c.id)) errors.push(`Colonne ${i}: id dupliqué`);
    colIds.add(c.id);
  });

  const taskIds = new Set();
  data.tasks.forEach((t, i) => {
    if (!t || typeof t !== 'object' || Array.isArray(t)) {
      errors.push(`Tâche ${i}: format invalide`);
      return;
    }
    if (typeof t.id !== 'string' || !t.id) errors.push(`Tâche ${i}: id manquant`);
    if (typeof t.id === 'string' && !safeIdPattern.test(t.id)) errors.push(`Tâche ${i}: id invalide`);
    if (typeof t.title !== 'string' || !t.title.trim()) errors.push(`Tâche ${i}: title manquant`);
    if (typeof t.description !== 'string') errors.push(`Tâche ${i}: description invalide`);
    if (typeof t.columnId !== 'string' || !t.columnId) errors.push(`Tâche ${i}: columnId manquant`);
    if (typeof t.columnId === 'string' && !safeIdPattern.test(t.columnId)) errors.push(`Tâche ${i}: columnId invalide`);
    if (t.columnId && !colIds.has(t.columnId)) errors.push(`Tâche ${i}: columnId "${t.columnId}" invalide`);
    if (!Number.isFinite(t.order)) errors.push(`Tâche ${i}: order invalide`);
    if (t.dueDate !== null && t.dueDate !== undefined && typeof t.dueDate !== 'string') errors.push(`Tâche ${i}: dueDate invalide`);
    if (!Number.isFinite(t.createdAt)) errors.push(`Tâche ${i}: createdAt invalide`);
    if (!Number.isFinite(t.updatedAt)) errors.push(`Tâche ${i}: updatedAt invalide`);
    if (!Number.isFinite(t.enteredColumnAt)) errors.push(`Tâche ${i}: enteredColumnAt invalide`);
    if (!t.timer || typeof t.timer !== 'object' || Array.isArray(t.timer)) errors.push(`Tâche ${i}: timer invalide`);
    if (t.timer && (!Number.isFinite(t.timer.elapsedMs) || t.timer.elapsedMs < 0)) errors.push(`Tâche ${i}: timer.elapsedMs invalide`);
    if (t.timer && t.timer.runningSince !== null && t.timer.runningSince !== undefined && !Number.isFinite(t.timer.runningSince)) errors.push(`Tâche ${i}: timer.runningSince invalide`);
    if (!t.timeByColumn || typeof t.timeByColumn !== 'object' || Array.isArray(t.timeByColumn)) errors.push(`Tâche ${i}: timeByColumn invalide`);
    if (t.timeByColumn && typeof t.timeByColumn === 'object' && !Array.isArray(t.timeByColumn)) {
      Object.entries(t.timeByColumn).forEach(([columnId, ms]) => {
        if (typeof columnId !== 'string' || !Number.isFinite(ms) || ms < 0) {
          errors.push(`Tâche ${i}: timeByColumn invalide`);
        }
      });
    }
    if (taskIds.has(t.id)) errors.push(`Tâche ${i}: id dupliqué`);
    taskIds.add(t.id);
    if (!Array.isArray(t.tags)) errors.push(`Tâche ${i}: tags invalide`);
    if (!Array.isArray(t.subtasks)) errors.push(`Tâche ${i}: subtasks invalide`);
    if (Array.isArray(t.tags)) {
      t.tags.forEach((tag, tagIndex) => {
        if (!tag || typeof tag !== 'object' || Array.isArray(tag)) {
          errors.push(`Tâche ${i}: tag ${tagIndex} invalide`);
          return;
        }
        if (typeof tag.name !== 'string' || !tag.name.trim()) errors.push(`Tâche ${i}: tag ${tagIndex} name invalide`);
        if (typeof tag.color !== 'string' || !tag.color.trim()) errors.push(`Tâche ${i}: tag ${tagIndex} color invalide`);
      });
    }
    if (Array.isArray(t.subtasks)) {
      const subtaskIds = new Set();
      t.subtasks.forEach((subtask, subtaskIndex) => {
        if (!subtask || typeof subtask !== 'object' || Array.isArray(subtask)) {
          errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} invalide`);
          return;
        }
        if (typeof subtask.id !== 'string' || !subtask.id) errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} id invalide`);
        if (typeof subtask.id === 'string' && !safeIdPattern.test(subtask.id)) errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} id invalide`);
        if (typeof subtask.text !== 'string' || !subtask.text.trim()) errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} text invalide`);
        if (typeof subtask.done !== 'boolean') errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} done invalide`);
        if (subtaskIds.has(subtask.id)) errors.push(`Tâche ${i}: sous-tâche ${subtaskIndex} id dupliqué`);
        subtaskIds.add(subtask.id);
      });
    }
  });

  return { valid: errors.length === 0, errors };
}

/* ============================================================
   JS — Keyboard Shortcuts
   ============================================================ */
document.addEventListener('keydown', (e) => {
  if (Utils.isInputFocused()) {
    if (e.key === 'Escape') {
      e.preventDefault();
      document.activeElement.blur();
      if (editingInline) cancelInlineEdit();
      else if (state.ui.modalOpen) closeModal();
    }
    return;
  }

  if (state.ui.modalOpen && e.key !== 'Escape') return;

  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    History.undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) {
    e.preventDefault();
    History.redo();
    return;
  }

  switch (e.key) {
    case 'n':
    case 'N':
      e.preventDefault();
      const firstCol = Utils.sortByOrder(state.columns)[0];
      if (firstCol) openTaskModal(firstCol.id);
      break;
    case 'Delete':
    case 'Backspace':
      if (state.ui.selectedTaskId) {
        e.preventDefault();
        confirmDeleteTask(state.ui.selectedTaskId);
      }
      break;
    case 'Escape':
      if (state.ui.modalOpen) closeModal();
      else if (editingInline) cancelInlineEdit();
      else if (document.getElementById('stats-panel').classList.contains('active')) document.getElementById('stats-panel').classList.remove('active');
      else if (state.selection.mode) { state.selection.mode = false; state.selection.taskIds = []; Render.all(); }
      else if (state.ui.selectedTaskId) { state.ui.selectedTaskId = null; document.querySelectorAll('.task-card.selected').forEach(c => c.classList.remove('selected')); }
      break;
    case 'ArrowUp': e.preventDefault(); navigateTasks('up'); break;
    case 'ArrowDown': e.preventDefault(); navigateTasks('down'); break;
    case 'ArrowLeft': e.preventDefault(); navigateTasks('left'); break;
    case 'ArrowRight': e.preventDefault(); navigateTasks('right'); break;
  }
});

/* ============================================================
   JS — Toast Notification
   ============================================================ */
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2500);
}

/* ============================================================
   JS — Timer Tick (1s interval, no dispatch)
   ============================================================ */
setInterval(() => {
  state.tasks.forEach(t => {
    if (Number.isFinite(t.timer.runningSince)) {
      const el = document.querySelector(`[data-timer-task-id="${t.id}"] .timer-value`);
      if (el) {
        el.textContent = Utils.formatHHMMSS(Utils.getElapsedMs(t));
      }
    }
  });
  if (state.tasks.some(t => Number.isFinite(t.timer.runningSince))) {
    Storage.save();
  }
  if (document.getElementById('stats-panel').classList.contains('active')) {
    Render.stats();
  }
}, 1000);

/* ============================================================
   JS — Overdue Check (60s interval)
   ============================================================ */
setInterval(() => {
  document.querySelectorAll('.task-card').forEach(card => {
    const taskId = card.getAttribute('data-task-id');
    const task = state.tasks.find(t => t.id === taskId);
    if (task) {
      card.classList.toggle('overdue', Utils.isOverdue(task, state.columns));
    }
  });
}, 60000);

/* ============================================================
   JS — Initialization
   ============================================================ */
window.addEventListener('beforeunload', () => Storage.flush());

state = Storage.load();
document.documentElement.setAttribute('data-theme', state.theme);
Render.all();

})();
</script>
