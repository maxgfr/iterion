<!-- ============================================================
     SECTION JS — Application Logic
     ============================================================ -->
<script>
(function() {
'use strict';

/* ============================================================
   JS — Utilities
   ============================================================ */
const STORAGE_VERSION = 2;
const SAVE_DEBOUNCE_MS = 300;

const Utils = {
  generateId() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      return window.crypto.randomUUID();
    }
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
  },
  sortByOrder(arr) { return arr.slice().sort((a, b) => a.order - b.order); },
  formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
    if (d.getTime() === today.getTime()) return "Aujourd'hui";
    if (d.getTime() === tomorrow.getTime()) return 'Demain';
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  },
  formatHHMMSS(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  isInputFocused() {
    const el = document.activeElement;
    if (!el) return false;
    const tag = el.tagName.toLowerCase();
    return tag === 'input' || tag === 'textarea' || tag === 'select' || el.getAttribute('contenteditable') === 'true';
  },
  isOverdue(task, columns) {
    if (!task.dueDate) return false;
    const sorted = Utils.sortByOrder(columns);
    const lastColId = sorted.length ? sorted[sorted.length - 1].id : null;
    if (task.columnId === lastColId) return false;
    const due = new Date(task.dueDate + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    return due < today;
  },
  debounce(fn, ms) {
    let t;
    return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
  },
  cloneState(s) {
    if (typeof structuredClone === 'function') {
      try {
        return structuredClone(s);
      } catch (error) {
        console.warn('structuredClone failed, falling back to JSON clone:', error);
      }
    }
    return JSON.parse(JSON.stringify(s));
  },
  getElapsedMs(task) {
    const timer = task && task.timer ? task.timer : { elapsedMs: 0, runningSince: null };
    let elapsed = Number.isFinite(timer.elapsedMs) ? timer.elapsedMs : 0;
    if (Number.isFinite(timer.runningSince)) {
      elapsed += Date.now() - timer.runningSince;
    }
    return elapsed;
  },
  escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      '\'': '&#39;'
    }[char]));
  },
  normalizeColor(value) {
    const candidate = typeof value === 'string' ? value.trim() : '';
    if (candidate) {
      try {
        if (window.CSS && CSS.supports && CSS.supports('color', candidate)) {
          return candidate;
        }
      } catch (error) {
        console.warn('Color validation failed:', error);
      }
    }
    return TAG_COLORS[0].color;
  }
};

/* ============================================================
   JS — Tag Colors
   ============================================================ */
const TAG_COLORS = [
  { name: 'Rouge', color: '#eb5a46' },
  { name: 'Orange', color: '#ff9f1a' },
  { name: 'Jaune', color: '#f2d600' },
  { name: 'Vert', color: '#61bd4f' },
  { name: 'Cyan', color: '#00c2e0' },
  { name: 'Bleu', color: '#0079bf' },
  { name: 'Violet', color: '#c377e0' },
  { name: 'Rose', color: '#ff78cb' }
];

function normalizeTags(tags) {
  const seen = new Set();
  const normalized = [];
  (Array.isArray(tags) ? tags : []).forEach((tag) => {
    const name = typeof tag?.name === 'string' ? tag.name.trim() : '';
    if (!name) return;
    const key = name.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    normalized.push({
      name,
      color: Utils.normalizeColor(tag?.color)
    });
  });
  return normalized;
}

function normalizeSubtasks(subtasks) {
  const normalized = [];
  (Array.isArray(subtasks) ? subtasks : []).forEach((subtask) => {
    const text = typeof subtask?.text === 'string' ? subtask.text.trim() : '';
    if (!text) return;
    normalized.push({
      id: typeof subtask?.id === 'string' && subtask.id ? subtask.id : Utils.generateId(),
      text,
      done: !!subtask?.done
    });
  });
  return normalized;
}

function normalizeTask(rawTask, columnIds, fallbackColumnId, defaultOrder) {
  if (!rawTask || typeof rawTask !== 'object') return null;
  const timer = rawTask.timer && typeof rawTask.timer === 'object' ? rawTask.timer : {};
  const safeColumnId = typeof rawTask.columnId === 'string' && columnIds.has(rawTask.columnId)
    ? rawTask.columnId
    : fallbackColumnId;
  const createdAt = Number.isFinite(rawTask.createdAt) ? rawTask.createdAt : Date.now();
  const updatedAt = Number.isFinite(rawTask.updatedAt) ? rawTask.updatedAt : createdAt;
  const timeByColumn = {};

  if (rawTask.timeByColumn && typeof rawTask.timeByColumn === 'object' && !Array.isArray(rawTask.timeByColumn)) {
    Object.entries(rawTask.timeByColumn).forEach(([columnId, ms]) => {
      if (typeof columnId === 'string' && Number.isFinite(ms) && ms >= 0) {
        timeByColumn[columnId] = ms;
      }
    });
  }

  return {
    id: typeof rawTask.id === 'string' && rawTask.id ? rawTask.id : Utils.generateId(),
    columnId: safeColumnId,
    title: typeof rawTask.title === 'string' ? rawTask.title : '',
    description: typeof rawTask.description === 'string' ? rawTask.description : '',
    order: Number.isFinite(rawTask.order) ? rawTask.order : defaultOrder,
    tags: normalizeTags(rawTask.tags),
    dueDate: typeof rawTask.dueDate === 'string' && rawTask.dueDate ? rawTask.dueDate : null,
    subtasks: normalizeSubtasks(rawTask.subtasks),
    createdAt,
    updatedAt,
    timer: {
      elapsedMs: Number.isFinite(timer.elapsedMs) && timer.elapsedMs >= 0 ? timer.elapsedMs : 0,
      runningSince: Number.isFinite(timer.runningSince) ? timer.runningSince : null
    },
    enteredColumnAt: Number.isFinite(rawTask.enteredColumnAt) ? rawTask.enteredColumnAt : updatedAt,
    timeByColumn
  };
}

function normalizeState(rawState) {
  const fallback = createDefaultState();
  if (!rawState || typeof rawState !== 'object' || Array.isArray(rawState)) return fallback;

  const sourceColumns = Array.isArray(rawState.columns) && rawState.columns.length ? rawState.columns : fallback.columns;
  const seenColumnIds = new Set();
  const columns = Utils.sortByOrder(sourceColumns.map((column, index) => {
    let id = typeof column?.id === 'string' && column.id ? column.id : Utils.generateId();
    while (seenColumnIds.has(id)) id = Utils.generateId();
    seenColumnIds.add(id);
    return {
      id,
      title: typeof column?.title === 'string' && column.title.trim() ? column.title.trim() : `Colonne ${index + 1}`,
      order: Number.isFinite(column?.order) ? column.order : index
    };
  }));

  columns.forEach((column, index) => { column.order = index; });
  const columnIds = new Set(columns.map(column => column.id));
  const fallbackColumnId = columns[0]?.id || fallback.columns[0].id;

  const tasks = [];
  (Array.isArray(rawState.tasks) ? rawState.tasks : []).forEach((rawTask, index) => {
    const task = normalizeTask(rawTask, columnIds, fallbackColumnId, index);
    if (task) tasks.push(task);
  });

  columns.forEach((column) => {
    Utils.sortByOrder(tasks.filter(task => task.columnId === column.id)).forEach((task, index) => {
      task.order = index;
    });
  });

  return {
    version: STORAGE_VERSION,
    theme: rawState.theme === 'dark' ? 'dark' : 'light',
    filters: {
      search: typeof rawState.filters?.search === 'string' ? rawState.filters.search : '',
      tags: Array.isArray(rawState.filters?.tags)
        ? rawState.filters.tags.filter(tag => typeof tag === 'string')
        : []
    },
    selection: { taskIds: [], mode: false },
    columns,
    tasks,
    ui: { selectedTaskId: null, modalOpen: false }
  };
}

function createHistorySnapshot(sourceState) {
  const snapshot = Utils.cloneState(sourceState);
  snapshot.version = STORAGE_VERSION;
  delete snapshot.ui;
  delete snapshot.selection;
  snapshot.tasks = sourceState.tasks.map((task) => {
    const clonedTask = Utils.cloneState(task);
    clonedTask.tags = normalizeTags(task.tags);
    clonedTask.subtasks = normalizeSubtasks(task.subtasks);
    clonedTask.timer = {
      elapsedMs: Utils.getElapsedMs(task),
      runningSince: null
    };
    return clonedTask;
  });
  return snapshot;
}

function reindexColumnTasks(columnId) {
  Utils.sortByOrder(state.tasks.filter(task => task.columnId === columnId)).forEach((task, index) => {
    task.order = index;
  });
}

/* ============================================================
   JS — Default State
   ============================================================ */
function createDefaultState() {
  const cols = [
    { id: Utils.generateId(), title: 'Backlog', order: 0 },
    { id: Utils.generateId(), title: 'To Do', order: 1 },
    { id: Utils.generateId(), title: 'In Progress', order: 2 },
    { id: Utils.generateId(), title: 'Done', order: 3 }
  ];
  return {
    version: STORAGE_VERSION,
    theme: 'light',
    filters: { search: '', tags: [] },
    selection: { taskIds: [], mode: false },
    columns: cols,
    tasks: [],
    ui: { selectedTaskId: null, modalOpen: false }
  };
}

/* ============================================================
   JS — State & History
   ============================================================ */
let state = createDefaultState();
let undoStack = [];
let redoStack = [];
const MAX_UNDO = 15;
let saveTimeoutId = null;

/* ============================================================
   JS — Storage
   ============================================================ */
const Storage = {
  persistNow() {
    try {
      const toSave = Utils.cloneState(state);
      toSave.version = STORAGE_VERSION;
      delete toSave.ui;
      delete toSave.selection;
      localStorage.setItem('kanban-state', JSON.stringify(toSave));
      localStorage.setItem('kanban-theme', state.theme);
    } catch(e) {
      console.warn('Save failed:', e);
      showToast('Erreur de sauvegarde localStorage');
    }
  },
  save(immediate) {
    if (immediate) {
      this.flush();
      return;
    }
    clearTimeout(saveTimeoutId);
    saveTimeoutId = setTimeout(() => {
      saveTimeoutId = null;
      this.persistNow();
    }, SAVE_DEBOUNCE_MS);
  },
  flush() {
    clearTimeout(saveTimeoutId);
    saveTimeoutId = null;
    this.persistNow();
  },
  load() {
    try {
      const theme = localStorage.getItem('kanban-theme');
      const raw = localStorage.getItem('kanban-state');
      if (!raw) {
        const freshState = createDefaultState();
        if (theme === 'dark' || theme === 'light') freshState.theme = theme;
        return freshState;
      }
      const parsed = normalizeState(JSON.parse(raw));
      if (theme === 'dark' || theme === 'light') parsed.theme = theme;
      return parsed;
    } catch(e) {
      console.warn('Load failed:', e);
      return createDefaultState();
    }
  }
};

/* ============================================================
   JS — History (Undo/Redo)
   ============================================================ */
const History = {
  pushUndo() {
    undoStack.push(JSON.stringify(createHistorySnapshot(state)));
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
    updateUndoRedoButtons();
  },
  undo() {
    if (!undoStack.length) return;
    redoStack.push(JSON.stringify(createHistorySnapshot(state)));
    state = normalizeState(JSON.parse(undoStack.pop()));
    editingInline = null;
    Storage.save(true);
    Render.all();
    updateUndoRedoButtons();
  },
  redo() {
    if (!redoStack.length) return;
    undoStack.push(JSON.stringify(createHistorySnapshot(state)));
    state = normalizeState(JSON.parse(redoStack.pop()));
    editingInline = null;
    Storage.save(true);
    Render.all();
    updateUndoRedoButtons();
  }
};

function updateUndoRedoButtons() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

/* ============================================================
   JS — Dispatch (centralized mutation)
   ============================================================ */
function dispatch(action, payload) {
  History.pushUndo();
  Actions[action](payload);
  Storage.save();
  Render.all();
}

/* ============================================================
   JS — Actions
   ============================================================ */
const Actions = {
  ADD_TASK(p) {
    const title = typeof p.title === 'string' ? p.title.trim() : '';
    if (!title) return;
    const colTasks = state.tasks.filter(t => t.columnId === p.columnId);
    const maxOrder = colTasks.length ? Math.max(...colTasks.map(t => t.order)) + 1 : 0;
    const now = Date.now();
    state.tasks.push({
      id: Utils.generateId(),
      columnId: p.columnId,
      title,
      description: typeof p.description === 'string' ? p.description.trim() : '',
      order: maxOrder,
      tags: normalizeTags(p.tags),
      dueDate: p.dueDate || null,
      subtasks: normalizeSubtasks(p.subtasks),
      createdAt: now,
      updatedAt: now,
      timer: { elapsedMs: 0, runningSince: null },
      enteredColumnAt: now,
      timeByColumn: {}
    });
  },
  UPDATE_TASK(p) {
    const task = state.tasks.find(t => t.id === p.id);
    if (!task) return;
    const changes = p.changes || {};
    if (typeof changes.title === 'string') task.title = changes.title.trim();
    if (typeof changes.description === 'string') task.description = changes.description.trim();
    if ('dueDate' in changes) task.dueDate = changes.dueDate || null;
    if ('tags' in changes) task.tags = normalizeTags(changes.tags);
    if ('subtasks' in changes) task.subtasks = normalizeSubtasks(changes.subtasks);
    task.updatedAt = Date.now();
  },
  DELETE_TASK(p) {
    const task = state.tasks.find(t => t.id === p.id);
    if (!task) return;
    state.tasks = state.tasks.filter(t => t.id !== p.id);
    reindexColumnTasks(task.columnId);
    state.selection.taskIds = state.selection.taskIds.filter(id => id !== p.id);
    if (state.ui.selectedTaskId === p.id) state.ui.selectedTaskId = null;
    if (editingInline && editingInline.taskId === p.id) editingInline = null;
  },
  MOVE_TASK(p) {
    const task = state.tasks.find(t => t.id === p.taskId);
    if (!task) return;
    const oldColId = task.columnId;
    const now = Date.now();
    // Update time tracking if column changed
    if (oldColId !== p.columnId) {
      const timeInOld = now - (task.enteredColumnAt || now);
      task.timeByColumn[oldColId] = (task.timeByColumn[oldColId] || 0) + timeInOld;
      task.enteredColumnAt = now;
      task.columnId = p.columnId;
    }
    const colTasks = Utils.sortByOrder(state.tasks.filter(t => t.columnId === p.columnId && t.id !== p.taskId));
    let newOrder = colTasks.length;
    if (typeof p.beforeTaskId === 'string') {
      const beforeIndex = colTasks.findIndex(t => t.id === p.beforeTaskId);
      newOrder = beforeIndex >= 0 ? beforeIndex : colTasks.length;
    } else if (Number.isFinite(p.order)) {
      newOrder = Math.max(0, Math.min(p.order, colTasks.length));
    }
    colTasks.splice(newOrder, 0, task);
    colTasks.forEach((t, i) => { t.order = i; });
    task.updatedAt = now;
    if (oldColId !== p.columnId) {
      reindexColumnTasks(oldColId);
    }
  },
  ADD_COLUMN(p) {
    const maxOrder = state.columns.length ? Math.max(...state.columns.map(c => c.order)) + 1 : 0;
    const title = typeof p.title === 'string' ? p.title.trim() : '';
    if (!title) return;
    state.columns.push({ id: Utils.generateId(), title, order: maxOrder });
  },
  RENAME_COLUMN(p) {
    const col = state.columns.find(c => c.id === p.id);
    const title = typeof p.title === 'string' ? p.title.trim() : '';
    if (col && title) col.title = title;
  },
  DELETE_COLUMN(p) {
    const taskIdsToRemove = state.tasks.filter(t => t.columnId === p.id).map(t => t.id);
    if (p.moveTo) {
      let nextOrder = state.tasks.filter(t => t.columnId === p.moveTo).length;
      state.tasks.forEach(t => {
        if (t.columnId === p.id) {
          const now = Date.now();
          const timeInOld = now - (t.enteredColumnAt || now);
          t.timeByColumn[p.id] = (t.timeByColumn[p.id] || 0) + timeInOld;
          t.enteredColumnAt = now;
          t.columnId = p.moveTo;
          t.order = nextOrder++;
        }
      });
      reindexColumnTasks(p.moveTo);
    } else {
      state.tasks = state.tasks.filter(t => t.columnId !== p.id);
    }
    state.columns = state.columns.filter(c => c.id !== p.id);
    Utils.sortByOrder(state.columns).forEach((c, i) => c.order = i);
    state.selection.taskIds = state.selection.taskIds.filter(id => state.tasks.some(t => t.id === id));
    if (state.ui.selectedTaskId && taskIdsToRemove.includes(state.ui.selectedTaskId) && !p.moveTo) {
      state.ui.selectedTaskId = null;
    }
    if (editingInline && taskIdsToRemove.includes(editingInline.taskId) && !p.moveTo) {
      editingInline = null;
    }
  },
  REORDER_COLUMNS(p) {
    p.orderedIds.forEach((id, i) => {
      const col = state.columns.find(c => c.id === id);
      if (col) col.order = i;
    });
  },
  TOGGLE_SUBTASK(p) {
    const task = state.tasks.find(t => t.id === p.taskId);
    if (!task) return;
    const sub = task.subtasks.find(s => s.id === p.subtaskId);
    if (sub) sub.done = !sub.done;
    task.updatedAt = Date.now();
  },
  BULK_MOVE(p) {
    const now = Date.now();
    const taskIds = new Set(p.taskIds);
    const movedTasks = Utils.sortByOrder(state.tasks.filter(task => taskIds.has(task.id)));
    const affectedColumns = new Set();
    const movedIntoTarget = [];

    movedTasks.forEach(task => {
      const oldColId = task.columnId;
      if (oldColId !== p.columnId) {
        const timeInOld = now - (task.enteredColumnAt || now);
        task.timeByColumn[oldColId] = (task.timeByColumn[oldColId] || 0) + timeInOld;
        task.enteredColumnAt = now;
        task.columnId = p.columnId;
        affectedColumns.add(oldColId);
        movedIntoTarget.push(task);
      }
      task.updatedAt = now;
    });

    const movedIntoTargetIds = new Set(movedIntoTarget.map(task => task.id));
    const targetTasks = Utils.sortByOrder(state.tasks.filter(task => task.columnId === p.columnId && !movedIntoTargetIds.has(task.id)));
    movedIntoTarget.forEach(task => targetTasks.push(task));
    targetTasks.forEach((task, index) => { task.order = index; });
    affectedColumns.forEach(reindexColumnTasks);
    state.selection.taskIds = [];
  },
  BULK_DELETE(p) {
    const taskIds = new Set(p.taskIds);
    const affectedColumns = new Set(state.tasks.filter(task => taskIds.has(task.id)).map(task => task.columnId));
    state.tasks = state.tasks.filter(t => !taskIds.has(t.id));
    affectedColumns.forEach(reindexColumnTasks);
    state.selection.taskIds = [];
    if (state.ui.selectedTaskId && taskIds.has(state.ui.selectedTaskId)) state.ui.selectedTaskId = null;
    if (editingInline && taskIds.has(editingInline.taskId)) editingInline = null;
  },
  BULK_TAG(p) {
    const tag = normalizeTags([p.tag])[0];
    if (!tag) return;
    p.taskIds.forEach(id => {
      const task = state.tasks.find(t => t.id === id);
      if (!task) return;
      if (!task.tags.some(existingTag => existingTag.name.toLowerCase() === tag.name.toLowerCase())) {
        task.tags.push({ ...tag });
        task.updatedAt = Date.now();
      }
    });
  },
  TIMER_START(p) {
    const task = state.tasks.find(t => t.id === p.taskId);
    if (task && !Number.isFinite(task.timer.runningSince)) {
      task.timer.runningSince = Date.now();
      task.updatedAt = task.timer.runningSince;
    }
  },
  TIMER_STOP(p) {
    const task = state.tasks.find(t => t.id === p.taskId);
    if (task && Number.isFinite(task.timer.runningSince)) {
      task.timer.elapsedMs += Date.now() - task.timer.runningSince;
      task.timer.runningSince = null;
      task.updatedAt = Date.now();
    }
  },
  IMPORT_STATE(p) {
    const imported = normalizeState({
      version: p.version,
      theme: p.theme,
      columns: p.columns,
      tasks: p.tasks
    });
    state.columns = imported.columns;
    state.tasks = imported.tasks;
    state.theme = imported.theme;
    state.version = imported.version;
    undoStack = [];
    redoStack = [];
    state.filters = { search: '', tags: [] };
    state.selection = { taskIds: [], mode: false };
    state.ui = { selectedTaskId: null, modalOpen: false };
    editingInline = null;
  }
};

/* ============================================================
   JS — Render
   ============================================================ */
let editingInline = null;
let pendingInlineFocus = null;

function createTaskDraft(task) {
  return {
    title: task.title || '',
    description: task.description || '',
    dueDate: task.dueDate || '',
    tags: normalizeTags(task.tags).map(tag => ({ ...tag })),
    subtasks: normalizeSubtasks(task.subtasks).map(subtask => ({ ...subtask }))
  };
}

function getEditingDraft(taskId) {
  return editingInline && editingInline.taskId === taskId ? editingInline.draft : null;
}

function syncInlineDraftValue(taskId, field, value) {
  const draft = getEditingDraft(taskId);
  if (!draft) return;
  draft[field] = value;
}

function syncInlineMetaValue(taskId, field, value) {
  if (!editingInline || editingInline.taskId !== taskId) return;
  editingInline[field] = value;
}

function startInlineEdit(taskId, focusField) {
  const task = state.tasks.find(item => item.id === taskId);
  if (!task) return;
  editingInline = {
    taskId,
    draft: createTaskDraft(task),
    newTagName: '',
    newTagColor: TAG_COLORS[0].color,
    newSubtaskText: ''
  };
  pendingInlineFocus = { taskId, field: focusField || 'title' };
  state.ui.selectedTaskId = taskId;
  Render.all();
}

function focusInlineEditor() {
  if (!pendingInlineFocus) return;
  const { taskId, field } = pendingInlineFocus;
  pendingInlineFocus = null;
  requestAnimationFrame(() => {
    const preferred = document.querySelector(`.task-card[data-task-id="${taskId}"] [data-inline-field="${field}"]`);
    const fallback = document.querySelector(`.task-card[data-task-id="${taskId}"] [data-inline-field="title"]`);
    const target = preferred || fallback;
    if (!target) return;
    target.focus();
    if (typeof target.select === 'function' && target.tagName.toLowerCase() !== 'textarea') {
      target.select();
    }
  });
}

function cancelInlineEdit(shouldRender) {
  editingInline = null;
  pendingInlineFocus = null;
  if (shouldRender !== false) Render.all();
}

function toggleInlineTag(taskId, tag) {
  const draft = getEditingDraft(taskId);
  if (!draft) return;
  const existingIndex = draft.tags.findIndex(item => item.name.toLowerCase() === tag.name.toLowerCase());
  if (existingIndex >= 0) draft.tags.splice(existingIndex, 1);
  else draft.tags.push({ name: tag.name, color: Utils.normalizeColor(tag.color) });
  pendingInlineFocus = { taskId, field: 'title' };
  Render.all();
}

function addInlineTag(taskId) {
  if (!editingInline || editingInline.taskId !== taskId) return;
  const name = editingInline.newTagName.trim();
  if (!name) return;
  const draft = editingInline.draft;
  if (!draft.tags.some(tag => tag.name.toLowerCase() === name.toLowerCase())) {
    draft.tags.push({ name, color: Utils.normalizeColor(editingInline.newTagColor) });
  }
  editingInline.newTagName = '';
  pendingInlineFocus = { taskId, field: 'title' };
  Render.all();
}

function removeInlineSubtask(taskId, subtaskId) {
  const draft = getEditingDraft(taskId);
  if (!draft) return;
  draft.subtasks = draft.subtasks.filter(subtask => subtask.id !== subtaskId);
  pendingInlineFocus = { taskId, field: 'title' };
  Render.all();
}

function addInlineSubtask(taskId) {
  if (!editingInline || editingInline.taskId !== taskId) return;
  const text = editingInline.newSubtaskText.trim();
  if (!text) return;
  editingInline.draft.subtasks.push({
    id: Utils.generateId(),
    text,
    done: false
  });
  editingInline.newSubtaskText = '';
  pendingInlineFocus = { taskId, field: 'title' };
  Render.all();
}

function saveInlineEdit(taskId) {
  const draft = getEditingDraft(taskId);
  if (!draft) return;
  const title = draft.title.trim();
  if (!title) {
    showToast('Le titre est requis');
    pendingInlineFocus = { taskId, field: 'title' };
    Render.all();
    return;
  }
  const changes = {
    title,
    description: draft.description.trim(),
    dueDate: draft.dueDate || null,
    tags: normalizeTags(draft.tags),
    subtasks: normalizeSubtasks(draft.subtasks)
  };
  editingInline = null;
  pendingInlineFocus = null;
  dispatch('UPDATE_TASK', { id: taskId, changes });
}

function confirmDeleteTask(taskId) {
  const task = state.tasks.find(item => item.id === taskId);
  if (!task) return;
  confirmAction(`Supprimer la tâche "${task.title}" ?`, () => {
    if (editingInline && editingInline.taskId === taskId) editingInline = null;
    dispatch('DELETE_TASK', { id: taskId });
  });
}

function buildInlineTaskEditor(task) {
  const draft = getEditingDraft(task.id);
  const editor = document.createElement('div');
  editor.className = 'task-inline-editor';
  editor.addEventListener('click', (event) => event.stopPropagation());
  editor.addEventListener('dblclick', (event) => event.stopPropagation());

  const topRow = document.createElement('div');
  topRow.className = 'task-card-header';
  if (state.selection.mode) {
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'task-bulk-checkbox';
    cb.checked = state.selection.taskIds.includes(task.id);
    cb.setAttribute('aria-label', 'Sélectionner ' + task.title);
    cb.addEventListener('change', () => toggleBulkSelect(task.id));
    topRow.appendChild(cb);
  }
  const hint = document.createElement('span');
  hint.className = 'task-inline-hint';
  hint.textContent = 'Édition inline';
  topRow.appendChild(hint);
  editor.appendChild(topRow);

  const titleGroup = document.createElement('div');
  titleGroup.className = 'form-group';
  const titleLabel = document.createElement('label');
  titleLabel.className = 'form-label';
  titleLabel.textContent = 'Titre';
  const titleInput = document.createElement('input');
  titleInput.className = 'form-input';
  titleInput.value = draft.title;
  titleInput.setAttribute('data-inline-field', 'title');
  titleInput.setAttribute('aria-label', 'Titre de la tâche');
  titleInput.addEventListener('input', (event) => syncInlineDraftValue(task.id, 'title', event.target.value));
  titleInput.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      event.preventDefault();
      cancelInlineEdit();
    }
    if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
      event.preventDefault();
      saveInlineEdit(task.id);
    }
  });
  titleGroup.append(titleLabel, titleInput);
  editor.appendChild(titleGroup);

  const descriptionGroup = document.createElement('div');
  descriptionGroup.className = 'form-group';
  const descriptionLabel = document.createElement('label');
  descriptionLabel.className = 'form-label';
  descriptionLabel.textContent = 'Description';
  const descriptionInput = document.createElement('textarea');
  descriptionInput.className = 'form-textarea';
  descriptionInput.value = draft.description;
  descriptionInput.setAttribute('data-inline-field', 'description');
  descriptionInput.setAttribute('aria-label', 'Description de la tâche');
  descriptionInput.addEventListener('input', (event) => syncInlineDraftValue(task.id, 'description', event.target.value));
  descriptionInput.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      event.preventDefault();
      cancelInlineEdit();
    }
    if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
      event.preventDefault();
      saveInlineEdit(task.id);
    }
  });
  descriptionGroup.append(descriptionLabel, descriptionInput);
  editor.appendChild(descriptionGroup);

  const dueRow = document.createElement('div');
  dueRow.className = 'task-inline-row';
  const dueWrap = document.createElement('div');
  dueWrap.className = 'form-group task-inline-grow';
  const dueLabel = document.createElement('label');
  dueLabel.className = 'form-label';
  dueLabel.textContent = 'Date d\'échéance';
  const dueInput = document.createElement('input');
  dueInput.type = 'date';
  dueInput.className = 'form-date';
  dueInput.value = draft.dueDate || '';
  dueInput.setAttribute('data-inline-field', 'dueDate');
  dueInput.setAttribute('aria-label', 'Date d\'échéance');
  dueInput.addEventListener('input', (event) => syncInlineDraftValue(task.id, 'dueDate', event.target.value));
  dueInput.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      event.preventDefault();
      cancelInlineEdit();
    }
  });
  dueWrap.append(dueLabel, dueInput);
  dueRow.appendChild(dueWrap);
  editor.appendChild(dueRow);

  const tagGroup = document.createElement('div');
  tagGroup.className = 'form-group';
  const tagLabel = document.createElement('label');
  tagLabel.className = 'form-label';
  tagLabel.textContent = 'Tags';
  tagGroup.appendChild(tagLabel);

  const knownTags = new Map();
  state.tasks.forEach((item) => {
    (item.tags || []).forEach((tag) => knownTags.set(tag.name, Utils.normalizeColor(tag.color)));
  });
  draft.tags.forEach((tag) => knownTags.set(tag.name, Utils.normalizeColor(tag.color)));

  const tagPalette = document.createElement('div');
  tagPalette.className = 'tag-palette';
  knownTags.forEach((color, name) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'tag-palette-item' + (draft.tags.some(tag => tag.name.toLowerCase() === name.toLowerCase()) ? ' active' : '');
    chip.textContent = name;
    chip.style.backgroundColor = color;
    chip.addEventListener('click', () => toggleInlineTag(task.id, { name, color }));
    tagPalette.appendChild(chip);
  });
  if (!knownTags.size) {
    const emptyTags = document.createElement('div');
    emptyTags.className = 'task-inline-empty';
    emptyTags.textContent = 'Aucun tag existant pour le moment.';
    tagGroup.appendChild(emptyTags);
  } else {
    tagGroup.appendChild(tagPalette);
  }

  const selectedTags = document.createElement('div');
  selectedTags.className = 'task-inline-tags';
  if (draft.tags.length) {
    draft.tags.forEach((tag) => {
      const selectedTag = document.createElement('button');
      selectedTag.type = 'button';
      selectedTag.className = 'tag-palette-item active';
      selectedTag.textContent = tag.name;
      selectedTag.style.backgroundColor = Utils.normalizeColor(tag.color);
      selectedTag.setAttribute('aria-label', 'Retirer le tag ' + tag.name);
      selectedTag.addEventListener('click', () => toggleInlineTag(task.id, tag));
      selectedTags.appendChild(selectedTag);
    });
  } else {
    const emptySelection = document.createElement('div');
    emptySelection.className = 'task-inline-empty';
    emptySelection.textContent = 'Sélectionnez ou créez des tags ci-dessous.';
    selectedTags.appendChild(emptySelection);
  }
  tagGroup.appendChild(selectedTags);

  const newTagRow = document.createElement('div');
  newTagRow.className = 'task-inline-row';
  const newTagInput = document.createElement('input');
  newTagInput.className = 'new-tag-input task-inline-grow';
  newTagInput.placeholder = 'Nouveau tag';
  newTagInput.value = editingInline.newTagName;
  newTagInput.setAttribute('aria-label', 'Nom du nouveau tag');
  newTagInput.addEventListener('input', (event) => syncInlineMetaValue(task.id, 'newTagName', event.target.value));
  newTagInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      addInlineTag(task.id);
    }
  });
  const newTagColor = document.createElement('select');
  newTagColor.className = 'bulk-select';
  newTagColor.setAttribute('aria-label', 'Couleur du tag');
  TAG_COLORS.forEach((colorOption) => {
    const option = document.createElement('option');
    option.value = colorOption.color;
    option.textContent = colorOption.name;
    option.selected = editingInline.newTagColor === colorOption.color;
    newTagColor.appendChild(option);
  });
  newTagColor.value = editingInline.newTagColor;
  newTagColor.addEventListener('change', (event) => syncInlineMetaValue(task.id, 'newTagColor', event.target.value));
  const addTagButton = document.createElement('button');
  addTagButton.type = 'button';
  addTagButton.className = 'btn btn-ghost';
  addTagButton.textContent = '+ Tag';
  addTagButton.addEventListener('click', () => addInlineTag(task.id));
  newTagRow.append(newTagInput, newTagColor, addTagButton);
  tagGroup.appendChild(newTagRow);
  editor.appendChild(tagGroup);

  const subtaskGroup = document.createElement('div');
  subtaskGroup.className = 'form-group';
  const subtaskLabel = document.createElement('label');
  subtaskLabel.className = 'form-label';
  subtaskLabel.textContent = 'Sous-tâches';
  subtaskGroup.appendChild(subtaskLabel);

  if (draft.subtasks.length) {
    const subtaskList = document.createElement('ul');
    subtaskList.className = 'task-inline-subtasks';
    draft.subtasks.forEach((subtask) => {
      const item = document.createElement('li');
      item.className = 'task-inline-subtask';
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = subtask.done;
      checkbox.setAttribute('aria-label', 'Marquer la sous-tâche comme terminée');
      checkbox.addEventListener('change', (event) => {
        subtask.done = event.target.checked;
      });
      const textInput = document.createElement('input');
      textInput.className = 'form-input task-inline-subtask-text';
      textInput.value = subtask.text;
      textInput.setAttribute('aria-label', 'Texte de la sous-tâche');
      textInput.addEventListener('input', (event) => {
        subtask.text = event.target.value;
      });
      textInput.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          event.preventDefault();
          cancelInlineEdit();
        }
      });
      const removeButton = document.createElement('button');
      removeButton.type = 'button';
      removeButton.className = 'task-action-btn danger';
      removeButton.textContent = '✕';
      removeButton.setAttribute('aria-label', 'Supprimer la sous-tâche');
      removeButton.addEventListener('click', () => removeInlineSubtask(task.id, subtask.id));
      item.append(checkbox, textInput, removeButton);
      subtaskList.appendChild(item);
    });
    subtaskGroup.appendChild(subtaskList);
  } else {
    const emptySubtasks = document.createElement('div');
    emptySubtasks.className = 'task-inline-empty';
    emptySubtasks.textContent = 'Aucune sous-tâche.';
    subtaskGroup.appendChild(emptySubtasks);
  }

  const addSubtaskRow = document.createElement('div');
  addSubtaskRow.className = 'task-inline-row';
  const addSubtaskInput = document.createElement('input');
  addSubtaskInput.className = 'form-input task-inline-grow';
  addSubtaskInput.placeholder = 'Nouvelle sous-tâche';
  addSubtaskInput.value = editingInline.newSubtaskText;
  addSubtaskInput.setAttribute('aria-label', 'Nouvelle sous-tâche');
  addSubtaskInput.addEventListener('input', (event) => syncInlineMetaValue(task.id, 'newSubtaskText', event.target.value));
  addSubtaskInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      addInlineSubtask(task.id);
    }
  });
  const addSubtaskButton = document.createElement('button');
  addSubtaskButton.type = 'button';
  addSubtaskButton.className = 'btn btn-ghost';
  addSubtaskButton.textContent = '+ Sous-tâche';
  addSubtaskButton.addEventListener('click', () => addInlineSubtask(task.id));
  addSubtaskRow.append(addSubtaskInput, addSubtaskButton);
  subtaskGroup.appendChild(addSubtaskRow);
  editor.appendChild(subtaskGroup);

  const actions = document.createElement('div');
  actions.className = 'task-inline-actions';

  const deleteButton = document.createElement('button');
  deleteButton.type = 'button';
  deleteButton.className = 'btn btn-danger task-inline-delete';
  deleteButton.textContent = 'Supprimer';
  deleteButton.addEventListener('click', () => confirmDeleteTask(task.id));

  const cancelButton = document.createElement('button');
  cancelButton.type = 'button';
  cancelButton.className = 'btn btn-ghost';
  cancelButton.textContent = 'Annuler';
  cancelButton.addEventListener('click', () => cancelInlineEdit());

  const saveButton = document.createElement('button');
  saveButton.type = 'button';
  saveButton.className = 'btn btn-primary';
  saveButton.textContent = 'Enregistrer';
  saveButton.addEventListener('click', () => saveInlineEdit(task.id));

  actions.append(deleteButton, cancelButton, saveButton);
  editor.appendChild(actions);

  return editor;
}

const Render = {
  all() {
    document.documentElement.setAttribute('data-theme', state.theme);
    this.board();
    this.tagFilters();
    this.bulkBar();
    this.updateThemeButton();
    updateUndoRedoButtons();
    document.getElementById('search-input').value = state.filters.search;
    if (document.getElementById('stats-panel').classList.contains('active')) {
      this.stats();
    }
    focusInlineEditor();
  },

  board() {
    const board = document.getElementById('board');
    const frag = document.createDocumentFragment();
    const sortedCols = Utils.sortByOrder(state.columns);

    sortedCols.forEach(col => {
      frag.appendChild(this.column(col));
    });

    // Add column button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-column-btn';
    addBtn.textContent = '+ Colonne';
    addBtn.addEventListener('click', () => promptAddColumn());
    frag.appendChild(addBtn);

    board.innerHTML = '';
    board.appendChild(frag);

    // Update bulk move select
    this.updateBulkMoveSelect();
  },

  column(col) {
    const el = document.createElement('div');
    el.className = 'column';
    el.setAttribute('data-column-id', col.id);

    const colTasks = Utils.sortByOrder(state.tasks.filter(t => t.columnId === col.id));
    const visibleTasks = colTasks.filter(t => this.isTaskVisible(t));

    // Header
    const header = document.createElement('div');
    header.className = 'column-header';

    const grip = document.createElement('span');
    grip.className = 'column-grip';
    grip.textContent = '⠿';
    grip.draggable = true;
    grip.addEventListener('dragstart', (e) => DragDrop.columnDragStart(e, col.id));
    grip.addEventListener('dragend', DragDrop.columnDragEnd);

    const title = document.createElement('span');
    title.className = 'column-title';
    title.textContent = col.title;
    title.addEventListener('dblclick', () => startColumnRename(col.id));

    const count = document.createElement('span');
    count.className = 'column-count';
    count.textContent = visibleTasks.length;

    const delBtn = document.createElement('button');
    delBtn.className = 'column-delete-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Supprimer la colonne';
    delBtn.setAttribute('aria-label', 'Supprimer la colonne ' + col.title);
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); confirmDeleteColumn(col.id); });

    header.append(grip, title, count, delBtn);

    // Body
    const body = document.createElement('div');
    body.className = 'column-body';
    body.setAttribute('data-column-id', col.id);
    body.addEventListener('dragover', (e) => DragDrop.dragOver(e, col.id));
    body.addEventListener('dragleave', DragDrop.dragLeave);
    body.addEventListener('drop', (e) => DragDrop.drop(e, col.id));

    colTasks.forEach(task => {
      const card = this.taskCard(task);
      if (!this.isTaskVisible(task)) card.classList.add('hidden');
      body.appendChild(card);
    });

    // Add task button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn';
    addBtn.textContent = '+ Tâche';
    addBtn.setAttribute('aria-label', 'Ajouter une tâche dans ' + col.title);
    addBtn.addEventListener('click', () => openTaskModal(col.id));

    el.append(header, body, addBtn);

    // Column drop zones
    el.addEventListener('dragover', (e) => DragDrop.columnDragOver(e, col.id));
    el.addEventListener('drop', (e) => DragDrop.columnDrop(e, col.id));

    return el;
  },

  taskCard(task) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.setAttribute('data-task-id', task.id);
    const isEditing = !!(editingInline && editingInline.taskId === task.id);
    card.draggable = !isEditing;

    if (state.ui.selectedTaskId === task.id) card.classList.add('selected');
    if (Utils.isOverdue(task, state.columns)) card.classList.add('overdue');
    if (isEditing) card.classList.add('editing');

    if (isEditing) {
      card.appendChild(buildInlineTaskEditor(task));
      return card;
    }

    card.addEventListener('dragstart', (e) => DragDrop.taskDragStart(e, task.id));
    card.addEventListener('dragend', DragDrop.taskDragEnd);
    card.addEventListener('click', (e) => {
      if (e.target.closest('.task-bulk-checkbox') || e.target.closest('.timer-btn') || e.target.closest('.task-action-btn')) return;
      selectTask(task.id);
    });
    card.addEventListener('dblclick', (e) => {
      if (e.target.closest('.task-bulk-checkbox') || e.target.closest('.timer-btn') || e.target.closest('.task-action-btn')) return;
      startInlineEdit(task.id, e.target.closest('.task-description') ? 'description' : 'title');
    });

    const hdr = document.createElement('div');
    hdr.className = 'task-card-header';

    if (state.selection.mode) {
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'task-bulk-checkbox';
      cb.checked = state.selection.taskIds.includes(task.id);
      cb.setAttribute('aria-label', 'Sélectionner ' + task.title);
      cb.addEventListener('change', () => toggleBulkSelect(task.id));
      hdr.appendChild(cb);
    }

    const titleEl = document.createElement('span');
    titleEl.className = 'task-title';
    titleEl.textContent = task.title;
    hdr.appendChild(titleEl);

    const actions = document.createElement('div');
    actions.className = 'task-card-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'task-action-btn';
    editBtn.type = 'button';
    editBtn.textContent = '✎';
    editBtn.title = 'Modifier inline';
    editBtn.setAttribute('aria-label', 'Modifier la tâche ' + task.title);
    editBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      startInlineEdit(task.id);
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'task-action-btn danger';
    deleteBtn.type = 'button';
    deleteBtn.textContent = '✕';
    deleteBtn.title = 'Supprimer';
    deleteBtn.setAttribute('aria-label', 'Supprimer la tâche ' + task.title);
    deleteBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      confirmDeleteTask(task.id);
    });

    actions.append(editBtn, deleteBtn);
    hdr.appendChild(actions);
    card.appendChild(hdr);

    if (task.description) {
      const desc = document.createElement('div');
      desc.className = 'task-description';
      desc.textContent = task.description;
      card.appendChild(desc);
    }

    if (task.tags && task.tags.length) {
      const tags = document.createElement('div');
      tags.className = 'task-tags';
      task.tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'task-tag';
        chip.textContent = tag.name;
        chip.style.backgroundColor = Utils.normalizeColor(tag.color);
        tags.appendChild(chip);
      });
      card.appendChild(tags);
    }

    const meta = document.createElement('div');
    meta.className = 'task-meta';
    let hasMeta = false;

    if (task.dueDate) {
      const due = document.createElement('span');
      due.className = 'task-due';
      if (Utils.isOverdue(task, state.columns)) due.classList.add('overdue-text');
      due.textContent = '📅 ' + Utils.formatDate(task.dueDate);
      meta.appendChild(due);
      hasMeta = true;
    }

    if (task.subtasks && task.subtasks.length) {
      const done = task.subtasks.filter(s => s.done).length;
      const total = task.subtasks.length;
      const prog = document.createElement('span');
      prog.className = 'task-subtask-progress';
      const progressLabel = document.createElement('span');
      progressLabel.textContent = `${done}/${total} done`;
      const bar = document.createElement('span');
      bar.className = 'subtask-bar';
      const fill = document.createElement('span');
      fill.className = 'subtask-bar-fill';
      fill.style.width = (total ? (done / total * 100) : 0) + '%';
      bar.appendChild(fill);
      prog.append(progressLabel, bar);
      meta.appendChild(prog);
      hasMeta = true;
    }

    const elapsed = Utils.getElapsedMs(task);
    const timerDiv = document.createElement('span');
    timerDiv.className = 'task-timer-display' + (Number.isFinite(task.timer.runningSince) ? ' running' : '');
    timerDiv.setAttribute('data-timer-task-id', task.id);

    const timerBtn = document.createElement('button');
    timerBtn.className = 'timer-btn';
    timerBtn.textContent = Number.isFinite(task.timer.runningSince) ? '⏸' : '▶';
    timerBtn.title = Number.isFinite(task.timer.runningSince) ? 'Stop timer' : 'Start timer';
    timerBtn.setAttribute('aria-label', Number.isFinite(task.timer.runningSince) ? 'Arrêter le chronomètre' : 'Démarrer le chronomètre');
    timerBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (Number.isFinite(task.timer.runningSince)) {
        dispatch('TIMER_STOP', { taskId: task.id });
      } else {
        dispatch('TIMER_START', { taskId: task.id });
      }
    });

    const timerLabel = document.createElement('span');
    timerLabel.className = 'timer-value';
    timerLabel.textContent = Utils.formatHHMMSS(elapsed);

    timerDiv.append(timerBtn, timerLabel);
    meta.appendChild(timerDiv);
    hasMeta = true;

    if (hasMeta) card.appendChild(meta);

    return card;
  },

  isTaskVisible(task) {
    const q = state.filters.search.toLowerCase();
    const matchText = !q || task.title.toLowerCase().includes(q) || (task.description || '').toLowerCase().includes(q);
    const filterTags = state.filters.tags;
    const matchTags = !filterTags.length || filterTags.some(ft => (task.tags || []).some(tt => tt.name === ft));
    return matchText && matchTags;
  },

  tagFilters() {
    const container = document.getElementById('tag-filters');
    container.innerHTML = '';
    // Collect all unique tags
    const allTags = new Map();
    state.tasks.forEach(t => {
      (t.tags || []).forEach(tag => {
        if (!allTags.has(tag.name)) allTags.set(tag.name, tag.color);
      });
    });
    if (!allTags.size) return;

    allTags.forEach((color, name) => {
      const chip = document.createElement('span');
      chip.className = 'tag-filter-chip' + (state.filters.tags.includes(name) ? ' active' : '');
      chip.textContent = name;
      chip.style.backgroundColor = Utils.normalizeColor(color);
      chip.addEventListener('click', () => {
        const idx = state.filters.tags.indexOf(name);
        if (idx >= 0) state.filters.tags.splice(idx, 1);
        else state.filters.tags.push(name);
        Render.all();
      });
      container.appendChild(chip);
    });

    if (state.filters.tags.length) {
      const clear = document.createElement('span');
      clear.className = 'clear-filters-btn';
      clear.textContent = '✕ Clear';
      clear.addEventListener('click', () => {
        state.filters.tags = [];
        Render.all();
      });
      container.appendChild(clear);
    }
  },

  bulkBar() {
    const bar = document.getElementById('bulk-bar');
    if (state.selection.mode) {
      bar.classList.add('active');
      document.getElementById('bulk-info').textContent = state.selection.taskIds.length + ' sélectionnée(s)';
    } else {
      bar.classList.remove('active');
    }
    document.getElementById('btn-bulk').textContent = state.selection.mode ? '✅' : '☑️';
  },

  updateBulkMoveSelect() {
    const sel = document.getElementById('bulk-move-select');
    sel.innerHTML = '<option value="">Déplacer vers…</option>';
    Utils.sortByOrder(state.columns).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.title;
      sel.appendChild(opt);
    });
  },

  updateThemeButton() {
    document.getElementById('btn-theme').textContent = state.theme === 'dark' ? '☀️' : '🌙';
  },

  stats() {
    const content = document.getElementById('stats-content');
    const sortedCols = Utils.sortByOrder(state.columns);
    const totalTasks = state.tasks.length;
    const lastCol = sortedCols[sortedCols.length - 1];
    const doneTasks = lastCol ? state.tasks.filter(t => t.columnId === lastCol.id).length : 0;
    const completionRate = totalTasks ? Math.round(doneTasks / totalTasks * 100) : 0;

    // Tasks per column data
    const colData = sortedCols.map(c => ({
      title: c.title,
      count: state.tasks.filter(t => t.columnId === c.id).length,
      id: c.id
    }));
    const maxCount = Math.max(1, ...colData.map(d => d.count));

    // Bar chart SVG
    const barWidth = 40;
    const gap = 20;
    const chartWidth = colData.length * (barWidth + gap);
    const chartHeight = 150;
    const barColors = ['#eb5a46', '#ff9f1a', '#0079bf', '#61bd4f', '#c377e0', '#00c2e0', '#ff78cb', '#f2d600'];

    let barsSvg = colData.map((d, i) => {
      const h = (d.count / maxCount) * (chartHeight - 30);
      const x = i * (barWidth + gap) + 10;
      const y = chartHeight - h - 20;
      const color = barColors[i % barColors.length];
      const safeTitle = Utils.escapeHTML(d.title.substring(0, 8));
      return `<rect class="chart-bar" x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="3" fill="${color}"/>
              <text class="chart-value" x="${x + barWidth/2}" y="${y - 4}" text-anchor="middle">${d.count}</text>
              <text class="chart-label" x="${x + barWidth/2}" y="${chartHeight - 4}" text-anchor="middle">${safeTitle}</text>`;
    }).join('');

    // Completion arc SVG
    const arcR = 40;
    const arcCirc = 2 * Math.PI * arcR;
    const arcOffset = arcCirc * (1 - completionRate / 100);

    // Time per column
    let timeRows = '';
    sortedCols.forEach(col => {
      let totalTime = 0;
      let count = 0;
      state.tasks.forEach(t => {
        let colTime = t.timeByColumn[col.id] || 0;
        if (t.columnId === col.id) {
          colTime += Date.now() - (t.enteredColumnAt || Date.now());
        }
        if (colTime > 0) { totalTime += colTime; count++; }
      });
      const avg = count ? totalTime / count : 0;
      // Total elapsed for tasks currently in this column
      let totalElapsed = 0;
      state.tasks.filter(t => t.columnId === col.id).forEach(t => {
        totalElapsed += Utils.getElapsedMs(t);
      });
      timeRows += `<div class="time-stat-row">
        <span>${Utils.escapeHTML(col.title)}</span>
        <span>Moy. présence: ${Utils.formatHHMMSS(avg)} | Timer manuel: ${Utils.formatHHMMSS(totalElapsed)}</span>
      </div>`;
    });

    content.innerHTML = `
      <div class="stats-section">
        <h3>Taux de complétion</h3>
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle cx="60" cy="60" r="${arcR}" fill="none" stroke="var(--border-color)" stroke-width="8"/>
          <circle cx="60" cy="60" r="${arcR}" fill="none" stroke="var(--color-success)" stroke-width="8"
            stroke-dasharray="${arcCirc}" stroke-dashoffset="${arcOffset}"
            stroke-linecap="round" transform="rotate(-90 60 60)"/>
          <text class="completion-text" x="60" y="62" text-anchor="middle" dominant-baseline="middle">${completionRate}%</text>
          <text class="completion-label" x="60" y="80" text-anchor="middle">complété</text>
        </svg>
      </div>
      <div class="stats-section">
        <h3>Tâches par colonne</h3>
        <svg class="chart-svg" viewBox="0 0 ${Math.max(chartWidth, 100)} ${chartHeight}" height="${chartHeight}">
          ${barsSvg}
        </svg>
      </div>
      <div class="stats-section">
        <h3>Temps par colonne</h3>
        ${timeRows}
      </div>
    `;
  }
};

/* ============================================================
   JS — Drag & Drop
   ============================================================ */
let dragState = { type: null, id: null };

const DragDrop = {
  getVisibleCards(body) {
    return [...body.querySelectorAll('.task-card:not(.dragging):not(.hidden)')];
  },

  getInsertBeforeCard(body, clientY) {
    const cards = this.getVisibleCards(body);
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      if (clientY < rect.top + rect.height / 2) {
        return card;
      }
    }
    return null;
  },

  taskDragStart(e, taskId) {
    dragState = { type: 'task', id: taskId };
    e.dataTransfer.setData('text/x-kanban-task', taskId);
    e.dataTransfer.effectAllowed = 'move';

    // Ghost
    const ghost = e.target.cloneNode(true);
    ghost.style.transform = 'scale(1.05) rotate(2deg)';
    ghost.style.opacity = '0.85';
    ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.2)';
    ghost.style.width = e.target.offsetWidth + 'px';
    ghost.style.position = 'absolute';
    const container = document.getElementById('ghost-container');
    container.innerHTML = '';
    container.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, e.offsetX, e.offsetY);

    requestAnimationFrame(() => e.target.classList.add('dragging'));
  },

  taskDragEnd(e) {
    e.target.classList.remove('dragging');
    document.getElementById('ghost-container').innerHTML = '';
    document.querySelectorAll('.drag-over, .drag-over-column, .drop-indicator').forEach(el => {
      el.classList.remove('drag-over', 'drag-over-column');
      if (el.classList.contains('drop-indicator')) el.remove();
    });
    dragState = { type: null, id: null };
  },

  dragOver(e, colId) {
    if (dragState.type !== 'task') return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const body = e.currentTarget;
    body.classList.add('drag-over');

    body.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    const insertBefore = this.getInsertBeforeCard(body, e.clientY);

    const indicator = document.createElement('div');
    indicator.className = 'drop-indicator';
    if (insertBefore) {
      body.insertBefore(indicator, insertBefore);
    } else {
      body.appendChild(indicator);
    }
  },

  dragLeave(e) {
    if (!e.currentTarget.contains(e.relatedTarget)) {
      e.currentTarget.classList.remove('drag-over');
      e.currentTarget.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    }
  },

  drop(e, colId) {
    e.preventDefault();
    e.stopPropagation();
    const body = e.currentTarget;
    body.classList.remove('drag-over');
    body.querySelectorAll('.drop-indicator').forEach(el => el.remove());

    if (dragState.type === 'task') {
      const taskId = e.dataTransfer.getData('text/x-kanban-task');
      if (!taskId) return;
      const insertBefore = this.getInsertBeforeCard(body, e.clientY);
      const beforeTaskId = insertBefore ? insertBefore.getAttribute('data-task-id') : null;
      dispatch('MOVE_TASK', { taskId, columnId: colId, beforeTaskId });
    }
  },

  // Column drag
  columnDragStart(e, colId) {
    dragState = { type: 'column', id: colId };
    e.dataTransfer.setData('text/x-kanban-column', colId);
    e.dataTransfer.effectAllowed = 'move';

    const colEl = e.target.closest('.column');
    if (colEl) {
      const ghost = colEl.cloneNode(true);
      ghost.style.transform = 'scale(0.9) rotate(1deg)';
      ghost.style.opacity = '0.7';
      ghost.style.width = colEl.offsetWidth + 'px';
      ghost.style.position = 'absolute';
      const container = document.getElementById('ghost-container');
      container.innerHTML = '';
      container.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 50, 20);
    }
  },

  columnDragEnd() {
    document.getElementById('ghost-container').innerHTML = '';
    document.querySelectorAll('.drag-over-column').forEach(el => el.classList.remove('drag-over-column'));
    dragState = { type: null, id: null };
  },

  columnDragOver(e, colId) {
    if (dragState.type !== 'column') return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const el = e.currentTarget;
    el.classList.add('drag-over-column');
  },

  columnDrop(e, colId) {
    if (dragState.type !== 'column') return;
    e.preventDefault();
    const draggedColId = e.dataTransfer.getData('text/x-kanban-column');
    if (!draggedColId || draggedColId === colId) return;

    document.querySelectorAll('.drag-over-column').forEach(el => el.classList.remove('drag-over-column'));

    const sorted = Utils.sortByOrder(state.columns);
    const ids = sorted.map(c => c.id);
    const fromIdx = ids.indexOf(draggedColId);
    const toIdx = ids.indexOf(colId);
    if (fromIdx < 0 || toIdx < 0) return;
    ids.splice(fromIdx, 1);
    ids.splice(toIdx, 0, draggedColId);
    dispatch('REORDER_COLUMNS', { orderedIds: ids });
  }
};

/* ============================================================
   JS — Touch Polyfill for Drag-and-Drop
   ============================================================ */
(function touchDnD() {
  let touchData = null;

  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.task-card[draggable="true"]');
    if (!card) return;
    const taskId = card.getAttribute('data-task-id');
    if (!taskId) return;
    touchData = {
      taskId,
      startX: e.touches[0].clientX,
      startY: e.touches[0].clientY,
      el: card,
      ghost: null,
      moved: false
    };
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!touchData) return;
    const dx = e.touches[0].clientX - touchData.startX;
    const dy = e.touches[0].clientY - touchData.startY;
    if (!touchData.moved && Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    touchData.moved = true;
    e.preventDefault();

    if (!touchData.ghost) {
      touchData.ghost = touchData.el.cloneNode(true);
      touchData.ghost.style.position = 'fixed';
      touchData.ghost.style.zIndex = '9999';
      touchData.ghost.style.pointerEvents = 'none';
      touchData.ghost.style.opacity = '0.85';
      touchData.ghost.style.transform = 'scale(1.05) rotate(2deg)';
      touchData.ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.2)';
      touchData.ghost.style.width = touchData.el.offsetWidth + 'px';
      document.body.appendChild(touchData.ghost);
      touchData.el.classList.add('dragging');
    }

    touchData.ghost.style.left = (e.touches[0].clientX - touchData.el.offsetWidth / 2) + 'px';
    touchData.ghost.style.top = (e.touches[0].clientY - 20) + 'px';

    // Highlight column under touch
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const elUnder = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    if (elUnder) {
      const colBody = elUnder.closest('.column-body');
      if (colBody) colBody.classList.add('drag-over');
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!touchData || !touchData.moved) { touchData = null; return; }
    touchData.el.classList.remove('dragging');
    if (touchData.ghost) touchData.ghost.remove();
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

    const touch = e.changedTouches[0];
    const elUnder = document.elementFromPoint(touch.clientX, touch.clientY);
    if (elUnder) {
      const colBody = elUnder.closest('.column-body');
      if (colBody) {
        const colId = colBody.getAttribute('data-column-id');
        const insertBefore = DragDrop.getInsertBeforeCard(colBody, touch.clientY);
        const beforeTaskId = insertBefore ? insertBefore.getAttribute('data-task-id') : null;
        dispatch('MOVE_TASK', { taskId: touchData.taskId, columnId: colId, beforeTaskId });
      }
    }
    touchData = null;
  });
})();

/* ============================================================
   JS — Modals
   ============================================================ */
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
  state.ui.modalOpen = true;
  // Focus first input
  setTimeout(() => {
    const first = document.querySelector('#modal-content input:not([type=hidden]):not([type=checkbox]), #modal-content textarea');
    if (first) first.focus();
  }, 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  state.ui.modalOpen = false;
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

/* ============================================================
   JS — Task Modal (Create/Edit)
   ============================================================ */
let modalTags = [];
let modalSubtasks = [];
let modalNewTagColor = TAG_COLORS[0].color;

function openTaskModal(columnId, task) {
  const isEdit = !!task;
  modalTags = isEdit ? normalizeTags(task.tags).map(tag => ({ ...tag })) : [];
  modalSubtasks = isEdit ? normalizeSubtasks(task.subtasks).map(subtask => ({ ...subtask })) : [];

  const allTags = new Map();
  state.tasks.forEach(t => (t.tags || []).forEach(tag => allTags.set(tag.name, tag.color)));

  const tagPalette = [...allTags.entries()].map(([name, color]) => {
    const active = modalTags.some(t => t.name === name) ? 'active' : '';
    const safeColor = Utils.normalizeColor(color);
    const safeName = Utils.escapeHTML(name);
    return `<span class="tag-palette-item ${active}" style="background:${safeColor}" data-tag-name="${safeName}" data-tag-color="${safeColor}" onclick="window._toggleModalTag(this)">${safeName}</span>`;
  }).join('');

  const subtaskHtml = modalSubtasks.map((s, i) =>
    `<li class="subtask-item">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="window._toggleModalSubtask(${i})">
      <span class="subtask-text">${Utils.escapeHTML(s.text)}</span>
      <span class="subtask-remove" onclick="window._removeModalSubtask(${i})">✕</span>
    </li>`
  ).join('');

  const html = `
    <div class="modal-title">${isEdit ? 'Modifier la tâche' : 'Nouvelle tâche'}</div>
    <div class="form-group">
      <label class="form-label">Titre *</label>
      <input class="form-input" id="modal-task-title" value="${isEdit ? Utils.escapeHTML(task.title) : ''}" placeholder="Titre de la tâche">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="modal-task-desc" placeholder="Description">${isEdit ? Utils.escapeHTML(task.description || '') : ''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Date d'échéance</label>
      <input class="form-date" type="date" id="modal-task-due" value="${isEdit && task.dueDate ? task.dueDate : ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tag-palette" id="modal-tag-palette">${tagPalette}</div>
      <div class="new-tag-row">
        <input class="new-tag-input" id="modal-new-tag-name" placeholder="Nouveau tag">
        <span class="color-select" id="modal-new-tag-color" style="background:${Utils.normalizeColor(modalNewTagColor)}" title="Couleur" onclick="window._cycleTagColor()"></span>
        <button class="btn btn-ghost" onclick="window._addNewTag()">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Sous-tâches</label>
      <ul class="subtask-list" id="modal-subtask-list">${subtaskHtml}</ul>
      <div class="add-subtask-row">
        <input class="form-input" id="modal-new-subtask" placeholder="Nouvelle sous-tâche">
        <button class="btn btn-ghost" onclick="window._addModalSubtask()">+</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-primary" id="task-modal-save">${isEdit ? 'Enregistrer' : 'Créer'}</button>
    </div>
  `;
  openModal(html);
  document.getElementById('task-modal-save').addEventListener('click', () => {
    window._saveTask(columnId, isEdit ? task.id : null);
  });
}

function openEditTaskModal(taskId) {
  startInlineEdit(taskId);
}

// Global modal helpers
window._closeModal = closeModal;

window._saveTask = function(colId, taskId) {
  const title = document.getElementById('modal-task-title').value.trim();
  if (!title) {
    document.getElementById('modal-task-title').classList.add('error');
    return;
  }
  const desc = document.getElementById('modal-task-desc').value.trim();
  const due = document.getElementById('modal-task-due').value || null;
  const normalizedTags = normalizeTags(modalTags);
  const normalizedSubtasks = normalizeSubtasks(modalSubtasks);

  if (taskId) {
    dispatch('UPDATE_TASK', { id: taskId, changes: { title, description: desc, dueDate: due, tags: normalizedTags, subtasks: normalizedSubtasks } });
  } else {
    dispatch('ADD_TASK', { columnId: colId, title, description: desc, dueDate: due, tags: normalizedTags, subtasks: normalizedSubtasks });
  }
  closeModal();
};

window._toggleModalTag = function(el) {
  const name = el.getAttribute('data-tag-name');
  const color = Utils.normalizeColor(el.getAttribute('data-tag-color'));
  const idx = modalTags.findIndex(t => t.name === name);
  if (idx >= 0) { modalTags.splice(idx, 1); el.classList.remove('active'); }
  else { modalTags.push({ name, color }); el.classList.add('active'); }
};

let tagColorIdx = 0;
window._cycleTagColor = function() {
  tagColorIdx = (tagColorIdx + 1) % TAG_COLORS.length;
  modalNewTagColor = TAG_COLORS[tagColorIdx].color;
  document.getElementById('modal-new-tag-color').style.background = modalNewTagColor;
};

window._addNewTag = function() {
  const input = document.getElementById('modal-new-tag-name');
  const name = input.value.trim();
  if (!name) return;
  const safeColor = Utils.normalizeColor(modalNewTagColor);
  if (!modalTags.some(t => t.name === name)) {
    modalTags.push({ name, color: safeColor });
  }
  input.value = '';
  const palette = document.getElementById('modal-tag-palette');
  const existing = [...palette.querySelectorAll('[data-tag-name]')].find(chip => chip.getAttribute('data-tag-name') === name);
  if (!existing) {
    const chip = document.createElement('span');
    chip.className = 'tag-palette-item active';
    chip.style.background = safeColor;
    chip.setAttribute('data-tag-name', name);
    chip.setAttribute('data-tag-color', safeColor);
    chip.textContent = name;
    chip.addEventListener('click', function() { window._toggleModalTag(this); });
    palette.appendChild(chip);
  }
};

window._toggleModalSubtask = function(idx) {
  if (modalSubtasks[idx]) modalSubtasks[idx].done = !modalSubtasks[idx].done;
};

window._removeModalSubtask = function(idx) {
  modalSubtasks.splice(idx, 1);
  refreshSubtaskList();
};

window._addModalSubtask = function() {
  const input = document.getElementById('modal-new-subtask');
  const text = input.value.trim();
  if (!text) return;
  modalSubtasks.push({ id: Utils.generateId(), text, done: false });
  input.value = '';
  refreshSubtaskList();
};

function refreshSubtaskList() {
  const list = document.getElementById('modal-subtask-list');
  if (!list) return;
  list.innerHTML = modalSubtasks.map((s, i) =>
    `<li class="subtask-item">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="window._toggleModalSubtask(${i})">
      <span class="subtask-text">${Utils.escapeHTML(s.text)}</span>
      <span class="subtask-remove" onclick="window._removeModalSubtask(${i})">✕</span>
    </li>`
  ).join('');
}

/* ============================================================
   JS — Confirmation Modal
   ============================================================ */
function confirmAction(message, onConfirm, extraHtml) {
  const html = `
    <div class="modal-title">Confirmation</div>
    <p class="confirm-text">${Utils.escapeHTML(message)}</p>
    ${extraHtml || ''}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-danger" id="confirm-yes">Confirmer</button>
    </div>
  `;
  openModal(html);
  document.getElementById('confirm-yes').addEventListener('click', () => {
    onConfirm();
    closeModal();
  });
}

/* ============================================================
   JS — Column Management
   ============================================================ */
function promptAddColumn() {
  const html = `
    <div class="modal-title">Nouvelle colonne</div>
    <div class="form-group">
      <input class="form-input" id="modal-col-name" placeholder="Nom de la colonne" autofocus>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-primary" id="add-col-confirm">Ajouter</button>
    </div>
  `;
  openModal(html);
  document.getElementById('add-col-confirm').addEventListener('click', () => {
    const title = document.getElementById('modal-col-name').value.trim();
    if (title) {
      dispatch('ADD_COLUMN', { title });
      closeModal();
    }
  });
  document.getElementById('modal-col-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('add-col-confirm').click();
  });
}

function startColumnRename(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const titleEl = document.querySelector(`.column[data-column-id="${colId}"] .column-title`);
  if (!titleEl) return;

  const input = document.createElement('input');
  input.className = 'column-title-input';
  input.value = col.title;
  titleEl.replaceWith(input);
  input.focus();
  input.select();

  const finish = (save) => {
    if (save && input.value.trim()) {
      dispatch('RENAME_COLUMN', { id: colId, title: input.value.trim() });
    } else {
      Render.all();
    }
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finish(true);
    if (e.key === 'Escape') finish(false);
  });
  input.addEventListener('blur', () => finish(true));
}

function confirmDeleteColumn(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const tasksInCol = state.tasks.filter(t => t.columnId === colId);
  const otherCols = state.columns.filter(c => c.id !== colId);

  let extraHtml = '';
  if (tasksInCol.length > 0 && otherCols.length > 0) {
    extraHtml = `<label class="form-label">Déplacer les ${tasksInCol.length} tâche(s) vers :</label>
      <select class="confirm-select" id="col-move-target">
        <option value="">Supprimer les tâches</option>
        ${otherCols.map(c => `<option value="${Utils.escapeHTML(c.id)}">${Utils.escapeHTML(c.title)}</option>`).join('')}
      </select>`;
  }

  confirmAction(
    `Supprimer la colonne "${col.title}" ?${tasksInCol.length ? ` (${tasksInCol.length} tâche(s))` : ''}`,
    () => {
      const sel = document.getElementById('col-move-target');
      const moveTo = sel ? sel.value : '';
      dispatch('DELETE_COLUMN', { id: colId, moveTo: moveTo || null });
    },
    extraHtml
  );
}

/* ============================================================
   JS — Task Selection & Navigation
   ============================================================ */
function selectTask(taskId) {
  state.ui.selectedTaskId = state.ui.selectedTaskId === taskId ? null : taskId;
  // Update visual without full rerender
  document.querySelectorAll('.task-card').forEach(card => {
    card.classList.toggle('selected', card.getAttribute('data-task-id') === state.ui.selectedTaskId);
  });
}

function navigateTasks(direction) {
  const sortedCols = Utils.sortByOrder(state.columns);
  const visibleTasks = sortedCols.map(col =>
    Utils.sortByOrder(state.tasks.filter(t => t.columnId === col.id && Render.isTaskVisible(t)))
  );

  if (!state.ui.selectedTaskId) {
    // Select first visible task
    for (const tasks of visibleTasks) {
      if (tasks.length) { selectTask(tasks[0].id); return; }
    }
    return;
  }

  let curColIdx = -1, curTaskIdx = -1;
  visibleTasks.forEach((tasks, ci) => {
    const ti = tasks.findIndex(t => t.id === state.ui.selectedTaskId);
    if (ti >= 0) { curColIdx = ci; curTaskIdx = ti; }
  });
  if (curColIdx < 0) return;

  let newColIdx = curColIdx, newTaskIdx = curTaskIdx;

  if (direction === 'up') { newTaskIdx = Math.max(0, curTaskIdx - 1); }
  else if (direction === 'down') { newTaskIdx = Math.min(visibleTasks[curColIdx].length - 1, curTaskIdx + 1); }
  else if (direction === 'left') {
    for (let i = curColIdx - 1; i >= 0; i--) {
      if (visibleTasks[i].length) { newColIdx = i; newTaskIdx = Math.min(curTaskIdx, visibleTasks[i].length - 1); break; }
    }
  }
  else if (direction === 'right') {
    for (let i = curColIdx + 1; i < visibleTasks.length; i++) {
      if (visibleTasks[i].length) { newColIdx = i; newTaskIdx = Math.min(curTaskIdx, visibleTasks[i].length - 1); break; }
    }
  }

  const target = visibleTasks[newColIdx] && visibleTasks[newColIdx][newTaskIdx];
  if (target) {
    selectTask(target.id);
    const el = document.querySelector(`[data-task-id="${target.id}"]`);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

/* ============================================================
   JS — Bulk Operations
   ============================================================ */
function toggleBulkMode() {
  state.selection.mode = !state.selection.mode;
  if (!state.selection.mode) state.selection.taskIds = [];
  Render.all();
}

function toggleBulkSelect(taskId) {
  const idx = state.selection.taskIds.indexOf(taskId);
  if (idx >= 0) state.selection.taskIds.splice(idx, 1);
  else state.selection.taskIds.push(taskId);
  Render.bulkBar();
}

document.getElementById('btn-bulk').addEventListener('click', toggleBulkMode);

document.getElementById('bulk-select-all').addEventListener('click', () => {
  state.selection.taskIds = state.tasks.filter(t => Render.isTaskVisible(t)).map(t => t.id);
  Render.all();
});

document.getElementById('bulk-deselect-all').addEventListener('click', () => {
  state.selection.taskIds = [];
  Render.all();
});

document.getElementById('bulk-cancel').addEventListener('click', () => {
  state.selection.mode = false;
  state.selection.taskIds = [];
  Render.all();
});

document.getElementById('bulk-move-btn').addEventListener('click', () => {
  const colId = document.getElementById('bulk-move-select').value;
  if (!colId || !state.selection.taskIds.length) return;
  dispatch('BULK_MOVE', { taskIds: [...state.selection.taskIds], columnId: colId });
});

document.getElementById('bulk-delete-btn').addEventListener('click', () => {
  if (!state.selection.taskIds.length) return;
  confirmAction(`Supprimer ${state.selection.taskIds.length} tâche(s) ?`, () => {
    dispatch('BULK_DELETE', { taskIds: [...state.selection.taskIds] });
  });
});

document.getElementById('bulk-tag-btn').addEventListener('click', () => {
  if (!state.selection.taskIds.length) return;
  const html = `
    <div class="modal-title">Ajouter un tag</div>
    <div class="form-group">
      <div class="tag-palette" id="bulk-tag-palette">
        ${TAG_COLORS.map(c => `<span class="tag-palette-item" style="background:${c.color}" data-color="${c.color}" onclick="this.classList.toggle('active')">${c.name}</span>`).join('')}
      </div>
      <div class="new-tag-row" style="margin-top:8px">
        <input class="new-tag-input" id="bulk-tag-name" placeholder="Nom du tag">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-primary" id="bulk-tag-confirm">Appliquer</button>
    </div>
  `;
  openModal(html);
  document.getElementById('bulk-tag-confirm').addEventListener('click', () => {
    const name = document.getElementById('bulk-tag-name').value.trim();
    const activeChip = document.querySelector('#bulk-tag-palette .active');
    if (!name && !activeChip) return;
    let tagName = name;
    let tagColor = TAG_COLORS[0].color;
    if (activeChip) {
      tagColor = activeChip.getAttribute('data-color');
      if (!tagName) tagName = activeChip.textContent;
    }
    if (tagName) {
      dispatch('BULK_TAG', { taskIds: [...state.selection.taskIds], tag: { name: tagName, color: tagColor } });
      closeModal();
    }
  });
});

/* ============================================================
   JS — Theme Toggle
   ============================================================ */
document.getElementById('btn-theme').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  Storage.save(true);

const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', Utils.debounce(() => {
  state.filters.search = searchInput.value;
  Render.all();
}, 150));

/* ============================================================
   JS — Undo/Redo Buttons

document.getElementById('btn-undo').addEventListener('click', () => History.undo());
