}

/* ============================================================
   JS — Column Management
   ============================================================ */
function promptAddColumn() {
  const html = `
    <div class="modal-title">Nouvelle colonne</div>
    <div class="form-group">
      <input class="form-input" id="modal-col-name" placeholder="Nom de la colonne" autofocus>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-primary" id="add-col-confirm">Ajouter</button>
    </div>
  `;
  openModal(html);
  document.getElementById('add-col-confirm').addEventListener('click', () => {
    const title = document.getElementById('modal-col-name').value.trim();
    if (title) {
      dispatch('ADD_COLUMN', { title });
      closeModal();
    }
  });
  document.getElementById('modal-col-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('add-col-confirm').click();
  });
}

function startColumnRename(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const titleEl = document.querySelector(`.column[data-column-id="${colId}"] .column-title`);
  if (!titleEl) return;

  const input = document.createElement('input');
  input.className = 'column-title-input';
  input.value = col.title;
  titleEl.replaceWith(input);
  input.focus();
  input.select();

  const finish = (save) => {
    if (save && input.value.trim()) {
      dispatch('RENAME_COLUMN', { id: colId, title: input.value.trim() });
    } else {
      Render.all();
    }
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finish(true);
    if (e.key === 'Escape') finish(false);
  });
  input.addEventListener('blur', () => finish(true));
}

function confirmDeleteColumn(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const tasksInCol = state.tasks.filter(t => t.columnId === colId);
  const otherCols = state.columns.filter(c => c.id !== colId);

  let extraHtml = '';
  if (tasksInCol.length > 0 && otherCols.length > 0) {
    extraHtml = `<label class="form-label">Déplacer les ${tasksInCol.length} tâche(s) vers :</label>
      <select class="confirm-select" id="col-move-target">
        <option value="">Supprimer les tâches</option>
        ${otherCols.map(c => `<option value="${c.id}">${c.title}</option>`).join('')}
      </select>`;
  }

  confirmAction(
    `Supprimer la colonne "${col.title}" ?${tasksInCol.length ? ` (${tasksInCol.length} tâche(s))` : ''}`,
    () => {
      const sel = document.getElementById('col-move-target');
      const moveTo = sel ? sel.value : '';
      dispatch('DELETE_COLUMN', { id: colId, moveTo: moveTo || null });
    },
    extraHtml
  );
}

/* ============================================================
   JS — Task Selection & Navigation
   ============================================================ */
function selectTask(taskId) {
  state.ui.selectedTaskId = state.ui.selectedTaskId === taskId ? null : taskId;
  // Update visual without full rerender
  document.querySelectorAll('.task-card').forEach(card => {
    card.classList.toggle('selected', card.getAttribute('data-task-id') === state.ui.selectedTaskId);
  });
}

function navigateTasks(direction) {
  const sortedCols = Utils.sortByOrder(state.columns);
  const visibleTasks = sortedCols.map(col =>
    Utils.sortByOrder(state.tasks.filter(t => t.columnId === col.id && Render.isTaskVisible(t)))
  );

  if (!state.ui.selectedTaskId) {
    // Select first visible task
    for (const tasks of visibleTasks) {
      if (tasks.length) { selectTask(tasks[0].id); return; }
    }
    return;
  }

  let curColIdx = -1, curTaskIdx = -1;
  visibleTasks.forEach((tasks, ci) => {
    const ti = tasks.findIndex(t => t.id === state.ui.selectedTaskId);
    if (ti >= 0) { curColIdx = ci; curTaskIdx = ti; }
  });
  if (curColIdx < 0) return;

  let newColIdx = curColIdx, newTaskIdx = curTaskIdx;

  if (direction === 'up') { newTaskIdx = Math.max(0, curTaskIdx - 1); }
  else if (direction === 'down') { newTaskIdx = Math.min(visibleTasks[curColIdx].length - 1, curTaskIdx + 1); }
  else if (direction === 'left') {
    for (let i = curColIdx - 1; i >= 0; i--) {
      if (visibleTasks[i].length) { newColIdx = i; newTaskIdx = Math.min(curTaskIdx, visibleTasks[i].length - 1); break; }
    }
  }
  else if (direction === 'right') {
    for (let i = curColIdx + 1; i < visibleTasks.length; i++) {
      if (visibleTasks[i].length) { newColIdx = i; newTaskIdx = Math.min(curTaskIdx, visibleTasks[i].length - 1); break; }
    }
  }

  const target = visibleTasks[newColIdx] && visibleTasks[newColIdx][newTaskIdx];
  if (target) {
    selectTask(target.id);
    const el = document.querySelector(`[data-task-id="${target.id}"]`);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

/* ============================================================
   JS — Bulk Operations
   ============================================================ */
function toggleBulkMode() {
  state.selection.mode = !state.selection.mode;
  if (!state.selection.mode) state.selection.taskIds = [];
  Render.all();
}

function toggleBulkSelect(taskId) {
  const idx = state.selection.taskIds.indexOf(taskId);
  if (idx >= 0) state.selection.taskIds.splice(idx, 1);
  else state.selection.taskIds.push(taskId);
  Render.bulkBar();
}

document.getElementById('btn-bulk').addEventListener('click', toggleBulkMode);

document.getElementById('bulk-select-all').addEventListener('click', () => {
  state.selection.taskIds = state.tasks.filter(t => Render.isTaskVisible(t)).map(t => t.id);
  Render.all();
});

document.getElementById('bulk-deselect-all').addEventListener('click', () => {
  state.selection.taskIds = [];
  Render.all();
});

document.getElementById('bulk-cancel').addEventListener('click', () => {
  state.selection.mode = false;
  state.selection.taskIds = [];
  Render.all();
});

document.getElementById('bulk-move-btn').addEventListener('click', () => {
  const colId = document.getElementById('bulk-move-select').value;
  if (!colId || !state.selection.taskIds.length) return;
  dispatch('BULK_MOVE', { taskIds: [...state.selection.taskIds], columnId: colId });
});

document.getElementById('bulk-delete-btn').addEventListener('click', () => {
  if (!state.selection.taskIds.length) return;
  confirmAction(`Supprimer ${state.selection.taskIds.length} tâche(s) ?`, () => {
    dispatch('BULK_DELETE', { taskIds: [...state.selection.taskIds] });
  });
});

document.getElementById('bulk-tag-btn').addEventListener('click', () => {
  if (!state.selection.taskIds.length) return;
  const html = `
    <div class="modal-title">Ajouter un tag</div>
    <div class="form-group">
      <div class="tag-palette" id="bulk-tag-palette">
        ${TAG_COLORS.map(c => `<span class="tag-palette-item" style="background:${c.color}" data-color="${c.color}" onclick="this.classList.toggle('active')">${c.name}</span>`).join('')}
      </div>
      <div class="new-tag-row" style="margin-top:8px">
        <input class="new-tag-input" id="bulk-tag-name" placeholder="Nom du tag">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window._closeModal()">Annuler</button>
      <button class="btn btn-primary" id="bulk-tag-confirm">Appliquer</button>
    </div>
  `;
  openModal(html);
  document.getElementById('bulk-tag-confirm').addEventListener('click', () => {
    const name = document.getElementById('bulk-tag-name').value.trim();
    const activeChip = document.querySelector('#bulk-tag-palette .active');
    if (!name && !activeChip) return;
    let tagName = name;
    let tagColor = TAG_COLORS[0].color;
    if (activeChip) {
      tagColor = activeChip.getAttribute('data-color');
      if (!tagName) tagName = activeChip.textContent;
    }
    if (tagName) {
      dispatch('BULK_TAG', { taskIds: [...state.selection.taskIds], tag: { name: tagName, color: tagColor } });
      closeModal();
    }
  });
});

/* ============================================================
   JS — Theme Toggle
   ============================================================ */
document.getElementById('btn-theme').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  Storage.save();
  Render.updateThemeButton();
});

/* ============================================================
   JS — Search
   ============================================================ */
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', Utils.debounce(() => {
  state.filters.search = searchInput.value;
  Render.all();
}, 150));

/* ============================================================
   JS — Undo/Redo Buttons
   ============================================================ */
document.getElementById('btn-undo').addEventListener('click', () => History.undo());
document.getElementById('btn-redo').addEventListener('click', () => History.redo());

/* ============================================================
   JS — Stats Panel
   ============================================================ */
document.getElementById('btn-stats').addEventListener('click', () => {
  const panel = document.getElementById('stats-panel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) Render.stats();
});

document.getElementById('stats-close').addEventListener('click', () => {
  document.getElementById('stats-panel').classList.remove('active');
});

/* ============================================================
   JS — Export
   ============================================================ */
document.getElementById('btn-export').addEventListener('click', () => {
  const exportData = Utils.cloneState(state);
  delete exportData.ui;
  delete exportData.selection;
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `kanban-export-${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Board exporté !');
});

/* ============================================================
   JS — Import
   ============================================================ */
document.getElementById('btn-import-trigger').addEventListener('click', () => {
  document.getElementById('import-input').click();
});

document.getElementById('import-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      // Validate schema
      const errors = validateImport(data);
      if (errors.length) {
        showToast('Import invalide: ' + errors[0]);
        return;
      }
      confirmAction('Importer ce fichier ? L\'état actuel sera remplacé.', () => {
        const backup = Utils.cloneState(state);
        try {
          // Ensure fields
          data.tasks.forEach(t => {
            t.tags = t.tags || [];
            t.subtasks = t.subtasks || [];
            t.timer = t.timer || { elapsedMs: 0, runningSince: null };
            t.timeByColumn = t.timeByColumn || {};
            t.enteredColumnAt = t.enteredColumnAt || Date.now();
          });
          dispatch('IMPORT_STATE', { columns: data.columns, tasks: data.tasks, theme: data.theme, version: data.version });
          showToast('Import réussi !');
        } catch (err) {
          // Rollback
          state = backup;
          state.ui = { selectedTaskId: null, modalOpen: false };
          state.selection = { taskIds: [], mode: false };
          Storage.save();
          Render.all();
          showToast('Erreur lors de l\'import, rollback effectué');
        }
      });
    } catch(err) {
      showToast('Fichier JSON invalide');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function validateImport(data) {
  const errors = [];
  if (!data || typeof data !== 'object') errors.push('Format invalide');
  if (!Array.isArray(data.columns)) errors.push('columns manquant ou invalide');
  if (!Array.isArray(data.tasks)) errors.push('tasks manquant ou invalide');
  if (errors.length) return errors;

  // Check columns
  const colIds = new Set();
  data.columns.forEach((c, i) => {
    if (!c.id) errors.push(`Colonne ${i}: id manquant`);
    if (!c.title) errors.push(`Colonne ${i}: title manquant`);
    if (colIds.has(c.id)) errors.push(`Colonne ${i}: id dupliqué`);
    colIds.add(c.id);
  });

  // Check tasks
  const taskIds = new Set();
  data.tasks.forEach((t, i) => {
    if (!t.id) errors.push(`Tâche ${i}: id manquant`);
    if (!t.title) errors.push(`Tâche ${i}: title manquant`);
    if (!t.columnId) errors.push(`Tâche ${i}: columnId manquant`);
    if (t.columnId && !colIds.has(t.columnId)) errors.push(`Tâche ${i}: columnId "${t.columnId}" invalide`);
    if (taskIds.has(t.id)) errors.push(`Tâche ${i}: id dupliqué`);
    taskIds.add(t.id);
    if (t.tags && !Array.isArray(t.tags)) errors.push(`Tâche ${i}: tags invalide`);
    if (t.subtasks && !Array.isArray(t.subtasks)) errors.push(`Tâche ${i}: subtasks invalide`);
  });

  return errors;
}

/* ============================================================
   JS — Keyboard Shortcuts
   ============================================================ */
document.addEventListener('keydown', (e) => {
  // Guard: don't process shortcuts when typing
  if (Utils.isInputFocused()) {
    if (e.key === 'Escape') {
      document.activeElement.blur();
      if (state.ui.modalOpen) closeModal();
    }
    return;
  }

  // Ctrl+Z / Ctrl+Shift+Z
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    History.undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) {
    e.preventDefault();
    History.redo();
    return;
  }

  switch (e.key) {
    case 'n':
    case 'N':
      e.preventDefault();
      const firstCol = Utils.sortByOrder(state.columns)[0];
      if (firstCol) openTaskModal(firstCol.id);
      break;
    case 'Delete':
    case 'Backspace':
      if (state.ui.selectedTaskId) {
        e.preventDefault();
        const task = state.tasks.find(t => t.id === state.ui.selectedTaskId);
        if (task) {
          confirmAction(`Supprimer la tâche "${task.title}" ?`, () => {
            dispatch('DELETE_TASK', { id: task.id });
            state.ui.selectedTaskId = null;
          });
        }
      }
      break;
    case 'Escape':
      if (state.ui.modalOpen) closeModal();
      else if (state.selection.mode) { state.selection.mode = false; state.selection.taskIds = []; Render.all(); }
      else if (state.ui.selectedTaskId) { state.ui.selectedTaskId = null; document.querySelectorAll('.task-card.selected').forEach(c => c.classList.remove('selected')); }
      break;
    case 'ArrowUp': e.preventDefault(); navigateTasks('up'); break;
    case 'ArrowDown': e.preventDefault(); navigateTasks('down'); break;
    case 'ArrowLeft': e.preventDefault(); navigateTasks('left'); break;
    case 'ArrowRight': e.preventDefault(); navigateTasks('right'); break;
  }
});

/* ============================================================
   JS — Toast Notification
   ============================================================ */
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2500);
}

/* ============================================================
   JS — Timer Tick (1s interval, no dispatch)
   ============================================================ */
setInterval(() => {
  const runningTimers = document.querySelectorAll('.task-timer-display.running .timer-value');
  state.tasks.forEach(t => {
    if (t.timer.runningSince) {
      const el = document.querySelector(`[data-timer-task-id="${t.id}"] .timer-value`);
      if (el) {
        el.textContent = Utils.formatHHMMSS(Utils.getElapsedMs(t));
      }
    }
  });
  // Save periodically for running timers
  if (state.tasks.some(t => t.timer.runningSince)) {
    Storage.save();
  }
  // Refresh stats if open
  if (document.getElementById('stats-panel').classList.contains('active')) {
    Render.stats();
  }
}, 1000);

/* ============================================================
   JS — Overdue Check (60s interval)
   ============================================================ */
setInterval(() => {
  document.querySelectorAll('.task-card').forEach(card => {
    const taskId = card.getAttribute('data-task-id');
    const task = state.tasks.find(t => t.id === taskId);
    if (task) {
      card.classList.toggle('overdue', Utils.isOverdue(task, state.columns));
    }
  });
}, 60000);

/* ============================================================
   JS — Initialization
   ============================================================ */
state = Storage.load();
document.documentElement.setAttribute('data-theme', state.theme);
Render.all();

})();
</script>
