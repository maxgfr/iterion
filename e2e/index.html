<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<script>
(function(){
  var t;
  try { t = localStorage.getItem('todo-theme'); } catch(e){}
  if (!t) {
    var prefersDark = typeof window.matchMedia === 'function' &&
      window.matchMedia('(prefers-color-scheme: dark)').matches;
    t = prefersDark ? 'dark' : 'light';
  }
  document.documentElement.dataset.theme = t;
})();
</script>
<style>
/* ── Tokens ── */
:root {
  color-scheme: light;
  --surface-1: #ffffff;
  --surface-2: #f5f5f7;
  --surface-3: #e8e8ed;
  --text-1: #1d1d1f;
  --text-2: #6e6e73;
  --border-subtle: #d2d2d7;
  --border-strong: #aeaeb2;
  --accent: #007aff;
  --accent-hover: #005ecb;
  --success: #34c759;
  --danger: #ff3b30;
  --danger-hover: #d32f2f;
  --focus-ring: rgba(0, 122, 255, 0.5);
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

[data-theme="dark"] {
  color-scheme: dark;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --surface-3: #3a3a3c;
  --text-1: #f5f5f7;
  --text-2: #98989d;
  --border-subtle: #3a3a3c;
  --border-strong: #545458;
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --success: #30d158;
  --danger: #ff453a;
  --danger-hover: #ff6961;
  --focus-ring: rgba(10, 132, 255, 0.5);
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--surface-2);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background-color .3s, color .3s;
}

/* ── Focus ── */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 3px;
}

/* ── Header ── */
.app-header {
  width: 100%;
  max-width: 600px;
  padding: 2rem 1rem 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.app-header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-1);
}

/* ── Theme toggle ── */
.theme-btn {
  background: var(--surface-3);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 8px 12px;
  cursor: pointer;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .85rem;
  font-family: var(--font);
  transition: background-color .2s, border-color .2s, color .2s;
}
.theme-btn:hover { background: var(--border-subtle); }
.theme-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* ── Main ── */
main {
  width: 100%;
  max-width: 600px;
  padding: 1.5rem 1rem;
  flex: 1;
}

/* ── Add form ── */
.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
}

.add-form-wrapper { position: relative; flex: 1; }

.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

.add-form input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  font-size: 1rem;
  font-family: var(--font);
  background: var(--surface-1);
  color: var(--text-1);
  transition: border-color .2s, background-color .2s, color .2s;
}
.add-form input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--focus-ring);
  outline: none;
}
.add-form input[type="text"]::placeholder { color: var(--text-2); }

.add-btn {
  padding: 12px 20px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-size: 1rem;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background-color .2s;
}
.add-btn:hover { background: var(--accent-hover); }

/* ── Filters ── */
.filters {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 8px 12px;
  margin-bottom: 1rem;
  background: var(--surface-1);
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  transition: background-color .2s, border-color .2s;
}
.filters legend {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
.filters label {
  flex: 1;
  text-align: center;
  cursor: pointer;
}
.filters input[type="radio"] {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
.filters .filter-label-text {
  display: block;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: .9rem;
  font-weight: 500;
  color: var(--text-2);
  transition: background-color .2s, color .2s;
}
.filters input[type="radio"]:checked + .filter-label-text {
  background: var(--accent);
  color: #fff;
}
.filters input[type="radio"]:focus-visible + .filter-label-text {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.filters label:hover .filter-label-text {
  background: var(--surface-3);
  color: var(--text-1);
}
.filters input[type="radio"]:checked + .filter-label-text:hover {
  background: var(--accent-hover);
  color: #fff;
}

/* ── Todo list ── */
.todo-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── Empty states ── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-2);
  font-size: .95rem;
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: .5rem; display: block; }

/* ── Todo item ── */
.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  transition: background-color .2s, border-color .2s, opacity .3s, transform .3s;
}
.todo-item.adding {
  animation: slideIn .3s ease-out;
}
.todo-item.removing {
  animation: slideOut .25s ease-in forwards;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: scaleY(1); }
  to   { opacity: 0; transform: scaleY(0.8); }
}

/* ── Checkbox ── */
.todo-checkbox {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--border-strong);
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: background-color .2s, border-color .2s;
}
.todo-checkbox:checked {
  background: var(--success);
  border-color: var(--success);
}
.todo-checkbox:checked::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 6px; height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.todo-checkbox:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ── Todo text ── */
.todo-text {
  flex: 1;
  font-size: 1rem;
  line-height: 1.4;
  cursor: text;
  position: relative;
  color: var(--text-1);
  word-break: break-word;
  transition: color .2s;
}
.todo-text[role="button"] {
  border-radius: 6px;
}
.todo-text[role="button"]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}
.todo-item.completed .todo-text {
  color: var(--text-2);
}
.todo-item.completed .todo-text::after {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 100%;
  height: 1px;
  background: var(--text-2);
  animation: strikethrough .3s ease forwards;
}
@keyframes strikethrough {
  from { transform: scaleX(0); transform-origin: left; }
  to   { transform: scaleX(1); transform-origin: left; }
}

/* ── Action buttons ── */
.todo-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.btn-icon {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 8px;
  cursor: pointer;
  font-size: .8rem;
  font-family: var(--font);
  font-weight: 500;
  color: var(--text-2);
  transition: background-color .2s, color .2s, border-color .2s;
}

@media (min-width: 600px) {
  .todo-item:not(:hover):not(:focus-within) .btn-icon {
    opacity: 0.4;
  }
  .todo-item:hover .btn-icon,
  .todo-item:focus-within .btn-icon {
    opacity: 1;
  }
}

.btn-edit:hover { background: var(--surface-3); color: var(--accent); }
.btn-delete:hover { background: rgba(255,59,48,.1); color: var(--danger); }

/* ── Inline edit ── */
.edit-form {
  display: flex;
  flex: 1;
  gap: 6px;
  align-items: center;
}
.edit-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--accent);
  border-radius: 6px;
  font-size: 1rem;
  font-family: var(--font);
  background: var(--surface-1);
  color: var(--text-1);
  box-shadow: 0 0 0 3px var(--focus-ring);
  transition: background-color .2s, color .2s;
}
.btn-save {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: .8rem;
  font-family: var(--font);
  font-weight: 600;
  transition: background-color .2s;
}
.btn-save:hover { background: var(--accent-hover); }
.btn-cancel {
  background: var(--surface-3);
  color: var(--text-1);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: .8rem;
  font-family: var(--font);
  font-weight: 500;
  transition: background-color .2s, color .2s, border-color .2s;
}
.btn-cancel:hover { background: var(--border-subtle); }

/* ── Footer ── */
.app-footer {
  width: 100%;
  max-width: 600px;
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.counter {
  font-size: .9rem;
  color: var(--text-2);
}
.clear-btn {
  background: transparent;
  border: 1px solid var(--danger);
  color: var(--danger);
  border-radius: var(--radius);
  padding: 8px 14px;
  cursor: pointer;
  font-size: .85rem;
  font-family: var(--font);
  font-weight: 500;
  transition: background-color .2s, color .2s;
}
.clear-btn:hover { background: var(--danger); color: #fff; }
.clear-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

/* ── Help text ── */
.help-text {
  text-align: center;
  font-size: .8rem;
  color: var(--text-2);
  padding: .5rem 1rem 2rem;
  max-width: 600px;
}

/* ── Live region ── */
.sr-live {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.05s !important;
  }
}

/* ── Responsive ── */
@media (max-width: 500px) {
  .app-header h1 { font-size: 1.5rem; }
  .add-form { flex-direction: column; }
  .add-btn { width: 100%; }
  .todo-actions { gap: 2px; }
  .btn-icon { padding: 4px 6px; font-size: .75rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1>Mes tâches</h1>
  <button class="theme-btn" type="button" data-action="toggle-theme" aria-label="Activer le thème sombre" aria-pressed="false">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm9-6a1 1 0 0 1-1 1h-1a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1zM5 12a1 1 0 0 1-1 1H3a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1zm12.36-5.64a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zM7.05 16.95a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zm10.61.71a1 1 0 0 1-1.41 0l-.71-.71a1 1 0 1 1 1.42-1.41l.7.7a1 1 0 0 1 0 1.42zM7.76 7.05a1 1 0 0 1-1.41 0l-.71-.71A1 1 0 1 1 7.05 4.93l.71.7a1 1 0 0 1 0 1.42zM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <span class="theme-label">Thème sombre</span>
  </button>
</header>

<main>
  <form class="add-form" data-action="add-todo">
    <div class="add-form-wrapper">
      <label for="new-todo" class="sr-only">Nouvelle tâche</label>
      <input type="text" id="new-todo" placeholder="Ajouter une tâche…" autocomplete="off" aria-label="Nouvelle tâche">
    </div>
    <button type="submit" class="add-btn" aria-label="Ajouter la tâche">Ajouter</button>
  </form>

  <fieldset class="filters" role="radiogroup">
    <legend>Filtrer les tâches</legend>
    <label>
      <input type="radio" name="filter" value="all" checked data-action="set-filter" aria-label="Afficher toutes les tâches">
      <span class="filter-label-text">Tous</span>
    </label>
    <label>
      <input type="radio" name="filter" value="active" data-action="set-filter" aria-label="Afficher les tâches actives">
      <span class="filter-label-text">Actifs</span>
    </label>
    <label>
      <input type="radio" name="filter" value="completed" data-action="set-filter" aria-label="Afficher les tâches terminées">
      <span class="filter-label-text">Terminés</span>
    </label>
  </fieldset>

  <ul class="todo-list" id="todo-list"></ul>

  <div id="empty-state" class="empty-state" hidden>
    <span class="empty-icon" aria-hidden="true"></span>
    <p id="empty-text"></p>
  </div>
</main>

<footer class="app-footer">
  <span class="counter" id="counter" aria-live="polite"></span>
  <button class="clear-btn" type="button" data-action="clear-completed" disabled aria-label="Effacer toutes les tâches terminées">Effacer terminées</button>
</footer>

<p class="help-text" id="help-text">Double-clic sur une tâche pour l'éditer. Au clavier, utilisez Tab puis Entrée, Espace ou F2 sur le texte d'une tâche.</p>

<div class="sr-live" id="live-region" aria-live="polite" aria-atomic="true"></div>

<script>
(function() {
  'use strict';

  // ── State ──
  var state = {
    todos: [],
    filter: 'all',
    editingId: null,
    draftText: ''
  };

  // ── DOM refs ──
  var dom = {
    list: document.getElementById('todo-list'),
    input: document.getElementById('new-todo'),
    counter: document.getElementById('counter'),
    emptyState: document.getElementById('empty-state'),
    emptyText: document.getElementById('empty-text'),
    liveRegion: document.getElementById('live-region'),
    clearBtn: document.querySelector('[data-action="clear-completed"]'),
    themeBtn: document.querySelector('[data-action="toggle-theme"]'),
    helpText: document.getElementById('help-text')
  };

  // ── Storage ──
  var storage = {
    KEY: 'todo-items',
    load: function() {
      try {
        var raw = localStorage.getItem(this.KEY);
        if (!raw) return [];
        var parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(function(item) {
          return item
            && typeof item.id === 'string'
            && typeof item.text === 'string'
            && item.text.trim() !== ''
            && typeof item.completed === 'boolean'
            && typeof item.createdAt === 'number';
        }).map(function(item) {
          return {
            id: item.id,
            text: item.text,
            completed: item.completed,
            createdAt: item.createdAt
          };
        });
      } catch(e) {
        return [];
      }
    },
    save: function(todos) {
      try {
        localStorage.setItem(this.KEY, JSON.stringify(todos));
      } catch(e) {}
    }
  };

  // ── A11y ──
  var a11y = {
    announce: function(msg) {
      dom.liveRegion.textContent = '';
      setTimeout(function() { dom.liveRegion.textContent = msg; }, 50);
    }
  };

  // ── Helpers ──
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  }

  function getFiltered() {
    return state.todos.filter(function(t) {
      if (state.filter === 'active') return !t.completed;
      if (state.filter === 'completed') return t.completed;
      return true;
    });
  }

  function getActiveCount() {
    return state.todos.filter(function(t) { return !t.completed; }).length;
  }

  function getCompletedCount() {
    return state.todos.filter(function(t) { return t.completed; }).length;
  }

  // ── Render helpers ──
  function renderItem(todo, isNew) {
    var li = document.createElement('li');
    li.className = 'todo-item' + (todo.completed ? ' completed' : '') + (isNew ? ' adding' : '');
    li.dataset.id = todo.id;

    if (state.editingId === todo.id) {
      li.innerHTML =
        '<form class="edit-form" data-action="save" data-id="' + todo.id + '">' +
          '<input class="edit-input" type="text" value="' + escapeAttr(state.draftText) + '" ' +
            'aria-label="Modifier la tâche" data-action="edit-input">' +
          '<button type="submit" class="btn-save" aria-label="Enregistrer la tâche modifiée">Enregistrer</button>' +
          '<button type="button" class="btn-cancel" data-action="cancel" data-id="' + todo.id + '" aria-label="Annuler la modification">Annuler</button>' +
        '</form>';
    } else {
      var textId = 'text-' + todo.id;
      li.innerHTML =
        '<input type="checkbox" class="todo-checkbox" ' +
          (todo.completed ? 'checked ' : '') +
          'aria-labelledby="' + textId + '" aria-label="' + escapeAttr((todo.completed ? 'Marquer la tâche comme active : ' : 'Marquer la tâche comme terminée : ') + todo.text) + '" data-action="toggle" data-id="' + todo.id + '">' +
        '<span class="todo-text" id="' + textId + '" data-action="dblclick-edit" data-id="' + todo.id + '" tabindex="0" role="button" aria-label="Modifier la tâche : ' + escapeAttr(todo.text) + '">' +
          escapeHtml(todo.text) +
        '</span>' +
        '<span class="todo-actions">' +
          '<button class="btn-icon btn-edit" data-action="edit" data-id="' + todo.id + '" aria-label="Éditer ' + escapeAttr(todo.text) + '">Éditer</button>' +
          '<button class="btn-icon btn-delete" data-action="delete" data-id="' + todo.id + '" aria-label="Supprimer ' + escapeAttr(todo.text) + '">Supprimer</button>' +
        '</span>';
    }

    if (isNew) {
      li.addEventListener('animationend', function() {
        li.classList.remove('adding');
      }, { once: true });
    }

    return li;
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function escapeAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Render ──
  var render = {
    fullList: function(newId) {
      var filtered = getFiltered();
      dom.list.innerHTML = '';

      if (state.todos.length === 0) {
        dom.emptyState.hidden = false;
        dom.emptyText.textContent = 'Aucune tâche pour le moment. Ajoutez-en une !';
        dom.list.style.display = 'none';
      } else if (filtered.length === 0) {
        dom.emptyState.hidden = false;
        dom.emptyText.textContent =
          state.filter === 'active' ? 'Aucune tâche active.' : 'Aucune tâche terminée.';
        dom.list.style.display = 'none';
      } else {
        dom.emptyState.hidden = true;
        dom.list.style.display = '';
        filtered.forEach(function(todo) {
          dom.list.appendChild(renderItem(todo, todo.id === newId));
        });
      }

      if (state.editingId) {
        var editInput = dom.list.querySelector('.edit-input');
        if (editInput) {
          editInput.focus();
          editInput.setSelectionRange(editInput.value.length, editInput.value.length);
        }
      }

      this.counter();
      this.clearBtn();
    },

    counter: function() {
      var active = getActiveCount();
      dom.counter.textContent = active + ' restante' + (active !== 1 ? 's' : '');
    },

    clearBtn: function() {
      dom.clearBtn.disabled = getCompletedCount() === 0;
    },

    updateSingleItem: function(id) {
      var todo = state.todos.find(function(t) { return t.id === id; });
      var existing = dom.list.querySelector('[data-id="' + id + '"]');
      if (todo && existing) {
        var newEl = renderItem(todo, false);
        existing.replaceWith(newEl);
        if (state.editingId === id) {
          var editInput = newEl.querySelector('.edit-input');
          if (editInput) {
            editInput.focus();
            editInput.setSelectionRange(editInput.value.length, editInput.value.length);
          }
        }
      }
      this.counter();
      this.clearBtn();
    }
  };

  // ── Actions ──
  var actions = {
    add: function(text) {
      text = text.trim();
      if (!text) return;
      var todo = {
        id: generateId(),
        text: text,
        completed: false,
        createdAt: Date.now()
      };
      state.todos.push(todo);
      storage.save(state.todos);
      render.fullList(todo.id);
      dom.input.value = '';
      dom.input.focus();
      a11y.announce('Tâche ajoutée : ' + text);
    },

    toggle: function(id) {
      var todo = state.todos.find(function(t) { return t.id === id; });
      if (!todo) return;
      todo.completed = !todo.completed;
      storage.save(state.todos);

      var shouldBeVisible = state.filter === 'all' ||
        (state.filter === 'active' && !todo.completed) ||
        (state.filter === 'completed' && todo.completed);

      if (!shouldBeVisible) {
        render.fullList();
      } else {
        render.updateSingleItem(id);
      }

      a11y.announce(todo.text + (todo.completed ? ' terminée' : ' réactivée'));
    },

    startEdit: function(id) {
      var todo = state.todos.find(function(t) { return t.id === id; });
      if (!todo) return;
      state.editingId = id;
      state.draftText = todo.text;
      render.updateSingleItem(id);
    },

    saveEdit: function(id) {
      var text = state.draftText.trim();
      var todo = state.todos.find(function(t) { return t.id === id; });
      if (!todo) return;
      if (text) {
        todo.text = text;
        storage.save(state.todos);
        a11y.announce('Tâche modifiée : ' + text);
      }
      state.editingId = null;
      state.draftText = '';
      render.updateSingleItem(id);

      setTimeout(function() {
        var btn = dom.list.querySelector('[data-action="edit"][data-id="' + id + '"]');
        if (btn) btn.focus();
      }, 10);
    },

    cancelEdit: function(id) {
      state.editingId = null;
      state.draftText = '';
      render.updateSingleItem(id);
      setTimeout(function() {
        var btn = dom.list.querySelector('[data-action="edit"][data-id="' + id + '"]');
        if (btn) btn.focus();
      }, 10);
    },

    deleteTodo: function(id) {
      var li = dom.list.querySelector('[data-id="' + id + '"]');
      var todo = state.todos.find(function(t) { return t.id === id; });
      if (!li || !todo) return;

      var next = li.nextElementSibling || li.previousElementSibling;
      var removed = false;

      function finalizeRemoval() {
        if (removed) return;
        removed = true;
        state.todos = state.todos.filter(function(t) { return t.id !== id; });
        storage.save(state.todos);
        render.fullList();

        if (next) {
          var nextId = next.dataset.id;
          var focusTarget = dom.list.querySelector('[data-id="' + nextId + '"] .btn-delete') ||
                           dom.list.querySelector('[data-id="' + nextId + '"] .todo-checkbox');
          if (focusTarget) focusTarget.focus();
          else dom.input.focus();
        } else {
          dom.input.focus();
        }
      }

      li.classList.add('removing');
      li.addEventListener('animationend', finalizeRemoval, { once: true });
      setTimeout(finalizeRemoval, 320);

      a11y.announce('Tâche supprimée : ' + todo.text);
    },

    clearCompleted: function() {
      var count = getCompletedCount();
      state.todos = state.todos.filter(function(t) { return !t.completed; });
      storage.save(state.todos);
      render.fullList();
      dom.clearBtn.focus();
      a11y.announce(count + ' tâche' + (count > 1 ? 's' : '') + ' terminée' + (count > 1 ? 's' : '') + ' supprimée' + (count > 1 ? 's' : ''));
    },

    setFilter: function(filter) {
      state.filter = filter;
      render.fullList();
    },

    toggleTheme: function() {
      var current = document.documentElement.dataset.theme;
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem('todo-theme', next); } catch(e) {}
      updateThemeButton(next);
    }
  };

  // ── Theme button ──
  function updateThemeButton(theme) {
    var sunIcon = dom.themeBtn.querySelector('.icon-sun');
    var moonIcon = dom.themeBtn.querySelector('.icon-moon');
    var label = dom.themeBtn.querySelector('.theme-label');

    if (theme === 'dark') {
      sunIcon.style.display = 'none';
      moonIcon.style.display = '';
      label.textContent = 'Thème clair';
      dom.themeBtn.setAttribute('aria-label', 'Activer le thème clair');
      dom.themeBtn.setAttribute('aria-pressed', 'true');
    } else {
      sunIcon.style.display = '';
      moonIcon.style.display = 'none';
      label.textContent = 'Thème sombre';
      dom.themeBtn.setAttribute('aria-label', 'Activer le thème sombre');
      dom.themeBtn.setAttribute('aria-pressed', 'false');
    }
  }

  // ── Event delegation ──
  document.querySelector('[data-action="add-todo"]').addEventListener('submit', function(e) {
    e.preventDefault();
    actions.add(dom.input.value);
  });

  dom.list.addEventListener('click', function(e) {
    var target = e.target.closest('[data-action]');
    if (!target) return;
    var action = target.dataset.action;
    var id = target.dataset.id;

    if (action === 'toggle') actions.toggle(id);
    else if (action === 'edit') actions.startEdit(id);
    else if (action === 'delete') actions.deleteTodo(id);
    else if (action === 'cancel') actions.cancelEdit(id);
  });

  dom.list.addEventListener('submit', function(e) {
    e.preventDefault();
    var form = e.target.closest('[data-action="save"]');
    if (form) actions.saveEdit(form.dataset.id);
  });

  dom.list.addEventListener('keydown', function(e) {
    if (e.target.classList.contains('edit-input') && e.key === 'Escape') {
      e.preventDefault();
      actions.cancelEdit(state.editingId);
      return;
    }

    if (e.target.matches('.todo-text[data-action="dblclick-edit"]')) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'F2') {
        e.preventDefault();
        actions.startEdit(e.target.dataset.id);
      }
    }
  });

  dom.list.addEventListener('input', function(e) {
    if (e.target.classList.contains('edit-input')) {
      state.draftText = e.target.value;
    }
  });

  dom.list.addEventListener('dblclick', function(e) {
    var target = e.target.closest('[data-action="dblclick-edit"]');
    if (target) actions.startEdit(target.dataset.id);
  });

  document.querySelector('.filters').addEventListener('change', function(e) {
    if (e.target.name === 'filter') {
      actions.setFilter(e.target.value);
    }
  });

  dom.clearBtn.addEventListener('click', function() {
    actions.clearCompleted();
  });

  dom.themeBtn.addEventListener('click', function() {
    actions.toggleTheme();
  });

  // Hide help text on touch devices
  if ('ontouchstart' in window) {
    dom.helpText.style.display = 'none';
  }

  // ── Init ──
  state.todos = storage.load();
  updateThemeButton(document.documentElement.dataset.theme);
  render.fullList();
})();
</script>
</body>
</html>
