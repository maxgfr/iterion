global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # iterion exposes /metrics directly when run with
  # ITERION_PROMETHEUS_ADDR=:9464. From inside the docker network,
  # host.docker.internal points back at the host's loopback (Docker
  # Desktop) or the gateway IP (Linux with the host-gateway driver).
  - job_name: iterion
    static_configs:
      - targets: ['host.docker.internal:9464']
    scrape_interval: 5s

# OTLP metrics arrive via the otlp-write-receiver feature flag enabled
# at the prometheus command line.
