name: review-pr
display_name: Revi
version: 0.2.0
description: |
  Read-only cross-family code reviewer. Reviews the working-tree diff
  of the current branch against its base with two independent reviewers
  (Claude + GPT), merges and de-duplicates their findings (cross-family
  agreement raises confidence), then publishes one issue per finding to
  the iterion native kanban board (labelled severity + type +
  source:revi) and writes a markdown report. Given a pull/merge-request
  URL (--var pr_url), it ALSO posts the findings onto that PR as a real
  forge review — inline comments anchored to file:line with one-click
  ```suggestion blocks (GitHub / GitLab / Forgejo). Never edits, fixes,
  or commits code — that is the improve-loops' job (Billy / Willy).
when_to_use: |
  Use when you want a PR/branch REVIEWED and its issues surfaced — to
  the board for triage and/or posted directly onto the PR (pass
  --var pr_url) as inline comments + ```suggestion fixes — but NOT
  auto-fixed. Read-only: Revi reports; Billy (branch-improve-loop)
  reviews AND fixes AND commits.
author: SocialGouv (devthejo) — review-pr/main.bot
schema_version: 1
triggers: [review-pr, pr-review, review]

dispatch_vars:
  scope_notes: |-
    {{issue.title}}

    {{issue.body}}

# Forge-access requirements for the studio Integrations auto-provisioner
# (advisory + discovery-time — the runtime does not read this).
forge:
  events: [pull_request, pull_request_comment]  # MR/PR open → review ; /revi note → re-review
  token_scopes:
    pull_requests: write     # post the review + inline ```suggestion blocks
    repository: read         # clone + read the diff
  secret: forge_token        # cross-ref with main.bot `secrets: { forge_token }`
  webhook:
    launch_vars:
      pr_review_mode: summary
      post_to_board: "false"
  rationale: |
    Revi reads the MR/PR diff and posts one forge review with inline
    comments + ```suggestion blocks. /revi in a note triggers a
    re-review on the same PR.

# Invocations: how Revi can be triggered (typed routing contract).
invocations:
  - kind: forge
    mode: direct
    forge: { event: pull_request, actions: [opened, reopened] }
  - kind: command
    mode: direct
    command: { name: revi, scope: pr, disambiguator: when_args_empty }
