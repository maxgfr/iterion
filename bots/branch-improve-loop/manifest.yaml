name: branch-improve-loop
display_name: Billy
version: 0.1.0
description: |
  Branch-scoped variant of whole-improve-loop. Runs review-fix iterations
  on the changes between a feature branch and its base, auto-commits each
  fix, and stops on cross-family double-approval.
when_to_use: |
  Use when an existing branch/PR needs a rigorous review + fix +
  commit before merge. Scopes to git diff base_ref...HEAD and commits
  a semantic message; pass base_ref for a non-main integration base.
author: SocialGouv (devthejo) — branch-improve-loop/main.bot
schema_version: 1

dispatch_vars:
  scope_notes: |-
    {{issue.title}}

    {{issue.body}}
  ## Board/comment-dispatched runs open a merge/pull request at the end
  ## and post the URL back onto the source issue. CLI runs keep the
  ## defaults (open_mr=false) so a plain local run just commits.
  open_mr: "true"
  source_issue_ref: "{{issue.id}}"

## Forge access for the MR/PR push + creation + the issue back-link.
## The auto-provisioner requests these scopes and binds the connection
## token under `forge_token` (cross-ref main.bot `secrets: { forge_token }`).
forge:
  events: [pull_request_comment]
  token_scopes:
    pull_requests: write     # open the MR/PR
    repository: write         # push the branch
    issues: write             # post the MR URL back onto the source issue
  secret: forge_token

invocations:
  - kind: command
    mode: board
    args_var: scope_notes
    command: { name: billy, aliases: [branch-improve-loop], scope: any, min_replier_role: maintainer }
  - kind: board
