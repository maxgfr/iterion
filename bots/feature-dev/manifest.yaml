name: feature-dev
display_name: Featurly
version: 0.1.0
description: |
  Autonomous end-to-end feature development. Takes a `feature_prompt`
  input, plans (Claude Code, read-only), implements (session-inherit),
  invokes /simplify, then runs the alternating Claude/GPT review-fix
  loop until two consecutive cross-family approvals.
when_to_use: |
  Use when an item can be phrased as one feature with a clear,
  externally-visible "done" state (new endpoint, UI affordance, CLI
  flag). Also the route for "build a new bot" work — point
  feature_prompt at the new .bot file to author.
author: SocialGouv (devthejo) — feature-dev/main.bot
schema_version: 1

dispatch_vars:
  feature_prompt: |-
    {{issue.title}}

    {{issue.body}}
  ## Board/comment-dispatched runs open a merge/pull request at the end
  ## and post the URL back onto the source issue. CLI runs keep the
  ## defaults (open_mr=false) so a plain local run just commits.
  open_mr: "true"
  source_issue_ref: "{{issue.id}}"

## Forge access for the MR/PR push + creation + the issue back-link.
## The auto-provisioner requests these scopes and binds the connection
## token under `forge_token` (cross-ref main.bot `secrets: { forge_token }`).
forge:
  events: [pull_request_comment]
  token_scopes:
    pull_requests: write     # open the MR/PR
    repository: write         # push the branch
    issues: write             # post the MR URL back onto the source issue
  secret: forge_token

invocations:
  - kind: command
    mode: board
    args_var: feature_prompt
    command: { name: featurly, aliases: [feature-dev], scope: any, min_replier_role: maintainer, opens_mr: true }
  - kind: board
