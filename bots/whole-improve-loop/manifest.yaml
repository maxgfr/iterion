name: whole-improve-loop
display_name: Willy
version: 0.5.0
description: |
  Whole-repository alternating Claude/GPT review-fix loop. Iterates
  until two consecutive cross-family approvals, with pushback
  protection against false positives. Fragments large workspaces by
  package into per-pass token-budgeted chunks (max_review_chunk_tokens,
  default 30000) so ~150k+ LoC repos review without context exhaustion;
  the coverage-gated streak terminates on a full cross-family clean
  sweep — and the streak is persisted across re-dispatches
  (.whole_improve_loop.state), so repos whose chunk count exceeds one
  run's max_review_passes converge over successive runs instead of
  failing forever. See docs/adr/011-whole-improve-loop-context-chunking.md.
when_to_use: |
  Use on EXISTING code when the operator wants a rigorous
  production-readiness audit across the whole workspace, or to drive
  iterative improvement on a specific axis (pass improvement_prompt).
  No new capability — just better/cleaner code.
author: SocialGouv (devthejo) — whole-improve-loop/main.bot
schema_version: 1

dispatch_vars:
  improvement_prompt: |-
    {{issue.title}}

    {{issue.body}}
  scope_notes: "{{issue.body}}"
  ## Board/comment-dispatched runs open a merge/pull request at the end
  ## and post the URL back onto the source issue. CLI runs keep the
  ## defaults (open_mr=false) so a plain local run just commits.
  open_mr: "true"
  source_issue_ref: "{{issue.id}}"

## Forge access for the MR/PR push + creation + the issue back-link.
## The auto-provisioner requests these scopes and binds the connection
## token under `forge_token` (cross-ref main.bot `secrets: { forge_token }`).
forge:
  events: [pull_request_comment]
  token_scopes:
    pull_requests: write     # open the MR/PR
    repository: write         # push the branch
    issues: write             # post the MR URL back onto the source issue
  secret: forge_token

invocations:
  - kind: command
    mode: board
    args_var: improvement_prompt
    command: { name: willy, aliases: [whole-improve-loop], scope: any, min_replier_role: maintainer, opens_mr: true }
  - kind: board
