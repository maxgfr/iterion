# Local-dev cloud stack: Mongo + NATS (with JetStream + KV) + MinIO +
# iterion server, exercising the full ITERION_MODE=cloud path. Boots
# MinIO with a single bucket via docker/minio-init.sh.
#
# Quick start:
#   task cloud:up           # bring everything up
#   curl localhost:4891/healthz
#   task cloud:down         # tear it down (removes volumes)
#
# Cloud-ready plan §F (T-38, T-39).

name: iterion-cloud

services:
  mongo:
    image: mongo:8.0
    command:
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Initiate the replica set on first boot so change streams (the
      # runview event subscription pivot in T-22) work without manual
      # mongosh steps. The check itself just confirms the server is up.
      test: |
        mongosh --quiet --eval '
          try { rs.status() } catch (e) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] });
          }
        '
      interval: 5s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command:
      - -js                # JetStream on (run queue + KV store live here)
      - -m
      - "8222"            # monitoring port
      - --store_dir=/data
    ports:
      - "4222:4222"        # client
      - "8222:8222"        # monitoring
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"        # S3 API
      - "9001:9001"        # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ITERION_S3_ENDPOINT: http://minio:9000
      ITERION_S3_ACCESS_KEY_ID: minioadmin
      ITERION_S3_SECRET_ACCESS_KEY: minioadmin
      ITERION_S3_BUCKET: iterion-artifacts
    volumes:
      - ./docker/minio-init.sh:/usr/local/bin/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-init.sh"]

  iterion-server:
    image: ghcr.io/socialgouv/iterion:edge
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: docker-compose
    depends_on:
      mongo:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # Mode + persistence
      ITERION_MODE: cloud
      ITERION_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      ITERION_MONGO_DB: iterion
      ITERION_NATS_URL: nats://nats:4222
      ITERION_S3_ENDPOINT: http://minio:9000
      ITERION_S3_REGION: us-east-1
      ITERION_S3_BUCKET: iterion-artifacts
      ITERION_S3_ACCESS_KEY_ID: minioadmin
      ITERION_S3_SECRET_ACCESS_KEY: minioadmin
      ITERION_S3_USE_PATH_STYLE: "true"
      ITERION_LOG_FORMAT: json
      ITERION_LOG_LEVEL: info
      # --- Auth (Phase A–D) ----------------------------------------
      # Required in cloud mode. Override via .env at the repo root.
      ITERION_JWT_SECRET: ${ITERION_JWT_SECRET:-ZGV2LWp3dC1zZWNyZXQtcGxlYXNlLXJvdGF0ZS1iZWZvcmUtcHJvZHVjdGlvbi11c2U=}
      ITERION_SECRETS_KEY: ${ITERION_SECRETS_KEY:-ZGV2LXNlY3JldHMta2V5LXJvdGF0ZS1pbi1wcm9kLQ==}
      ITERION_BOOTSTRAP_ADMIN_EMAIL: ${ITERION_BOOTSTRAP_ADMIN_EMAIL:-admin@dev.local}
      ITERION_SIGNUP_MODE: ${ITERION_SIGNUP_MODE:-invite_only}
      ITERION_PUBLIC_URL: ${ITERION_PUBLIC_URL:-http://localhost:4891}
      ITERION_COOKIE_SECURE: ${ITERION_COOKIE_SECURE:-false}
      ITERION_OIDC_GOOGLE_ENABLED: ${ITERION_OIDC_GOOGLE_ENABLED:-false}
      ITERION_OIDC_GOOGLE_CLIENT_ID: ${ITERION_OIDC_GOOGLE_CLIENT_ID:-}
      ITERION_OIDC_GOOGLE_CLIENT_SECRET: ${ITERION_OIDC_GOOGLE_CLIENT_SECRET:-}
      ITERION_OIDC_GITHUB_ENABLED: ${ITERION_OIDC_GITHUB_ENABLED:-false}
      ITERION_OIDC_GITHUB_CLIENT_ID: ${ITERION_OIDC_GITHUB_CLIENT_ID:-}
      ITERION_OIDC_GITHUB_CLIENT_SECRET: ${ITERION_OIDC_GITHUB_CLIENT_SECRET:-}
      ITERION_OIDC_GENERIC_ENABLED: ${ITERION_OIDC_GENERIC_ENABLED:-false}
      ITERION_OIDC_GENERIC_ISSUER_URL: ${ITERION_OIDC_GENERIC_ISSUER_URL:-}
      ITERION_OIDC_GENERIC_CLIENT_ID: ${ITERION_OIDC_GENERIC_CLIENT_ID:-}
      ITERION_OIDC_GENERIC_CLIENT_SECRET: ${ITERION_OIDC_GENERIC_CLIENT_SECRET:-}
      ITERION_OAUTH_FORFAIT_ANTHROPIC_CLIENT_ID: ${ITERION_OAUTH_FORFAIT_ANTHROPIC_CLIENT_ID:-}
      ITERION_OAUTH_FORFAIT_CODEX_CLIENT_ID: ${ITERION_OAUTH_FORFAIT_CODEX_CLIENT_ID:-}
      # LLM credentials. In cloud mode these are env-fallbacks only —
      # tenants register their keys in the admin UI (BYOK) and the
      # publisher seals them per-run. The env value is consulted only
      # when no team-scoped key is configured for a provider.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "4891:4891"
    healthcheck:
      # /readyz pings Mongo+NATS+S3 with a 1s deadline per dep, so a
      # backend hiccup flips the iterion-server container to unhealthy
      # without restarting the pod.
      test: ["CMD", "curl", "-fsS", "http://localhost:4891/readyz"]
      interval: 5s
      retries: 30
    command: ["server", "--port", "4891", "--bind", "0.0.0.0"]

  iterion-runner:
    image: ghcr.io/socialgouv/iterion:edge
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: docker-compose
    depends_on:
      iterion-server:
        condition: service_healthy
    command: ["runner"]
    environment:
      ITERION_MODE: cloud
      ITERION_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      ITERION_MONGO_DB: iterion
      ITERION_NATS_URL: nats://nats:4222
      ITERION_S3_ENDPOINT: http://minio:9000
      ITERION_S3_REGION: us-east-1
      ITERION_S3_BUCKET: iterion-artifacts
      ITERION_S3_ACCESS_KEY_ID: minioadmin
      ITERION_S3_SECRET_ACCESS_KEY: minioadmin
      ITERION_S3_USE_PATH_STYLE: "true"
      ITERION_RUNNER_WORKDIR: /var/lib/iterion/work
      ITERION_LOG_FORMAT: json
      ITERION_LOG_LEVEL: info
      # The runner needs the same ITERION_SECRETS_KEY as the server so
      # it can unseal the per-run RunBundle (BYOK + OAuth-forfait).
      # Phase C+D.
      ITERION_SECRETS_KEY: ${ITERION_SECRETS_KEY:-ZGV2LXNlY3JldHMta2V5LXJvdGF0ZS1pbi1wcm9kLQ==}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - runner-work:/var/lib/iterion/work

volumes:
  mongo-data:
  nats-data:
  minio-data:
  runner-work:
