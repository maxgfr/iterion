version: "3"

vars:
  BINARY: iterion
  CMD: ./cmd/iterion
  VERSION:
    sh: node -p "require('./package.json').version" 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo ""
  LDFLAGS: -X github.com/SocialGouv/iterion/internal/appinfo.Version=v{{.VERSION}} -X github.com/SocialGouv/iterion/internal/appinfo.Commit={{.COMMIT}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the iterion binary
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY}} {{.CMD}}
    sources:
      - "**/*.go"
      - go.mod
    generates:
      - "{{.BINARY}}"

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run all unit tests with verbose output
    cmds:
      - go test -v ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - go test -v -timeout 120s ./e2e/...

  test:live:
    desc: Run live e2e tests via MCP delegation (requires claude + codex CLIs)
    cmds:
      - go test -v -run TestLive -timeout 35m ./e2e/...

  test:live:todo:
    desc: Run the todo app live e2e test (requires claude + codex CLIs)
    cmds:
      - go test -v -count=1 -run TestLive_TodoApp_DualModel_MCP -timeout 35m ./e2e/...

  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run fmt and vet
    deps: [fmt, vet]

  run:
    desc: Build and run iterion (pass args after --)
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}

  install:
    desc: Build and install iterion to $GOPATH/bin
    env:
      CGO_ENABLED: "0"
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.CMD}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}

  validate:
    desc: Validate an .iter file (pass file after --)
    deps: [build]
    cmds:
      - ./{{.BINARY}} validate {{.CLI_ARGS}}

  diagram:
    desc: Generate Mermaid diagram from an .iter file (pass file after --)
    deps: [build]
    cmds:
      - ./{{.BINARY}} diagram {{.CLI_ARGS}}

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test
