# Local-development values: bundle Mongo + NATS + MinIO sub-charts so
# `helm install iterion ./charts/iterion -f values-dev.yaml` brings up a
# fully self-contained cloud-mode stack. Use this for `task chart:kind`
# and ad-hoc experiments. **Not for production** — the credentials are
# hard-coded and the persistence is single-replica.

mode: cloud

server:
  replicas: 1
  hpa:
    enabled: false  # disable HPA in dev, predictable single-pod

runner:
  enabled: true
  replicas: 1
  keda:
    enabled: false  # KEDA optional; the dev stack doesn't ship it

ingress:
  enabled: false  # rely on `kubectl port-forward svc/iterion 4891`

config:
  log:
    format: human
    level: debug
  mongo:
    # Bitnami's mongodb subchart only creates a Service named
    # `<fullname>` when architecture=replicaset with replicaCount>=2;
    # for standalone or single-replica configs it ships only the
    # headless Service (`<fullname>-headless`). Point the client at the
    # headless one — DNS returns the pod IP directly and the driver
    # opens the same connection it would to a normal ClusterIP.
    uri: mongodb://iterion-mongodb-headless:27017
    database: iterion
  nats:
    url: nats://iterion-nats:4222
  s3:
    endpoint: http://iterion-minio:9000
    region: us-east-1
    bucket: iterion-artifacts
    usePathStyle: true

secrets:
  llm:
    create: true
    # Override at install time: `--set secrets.llm.anthropicApiKey=...`
    anthropicApiKey: ""
    openaiApiKey: ""
  storage:
    create: true
    s3AccessKeyId: minioadmin
    s3SecretAccessKey: minioadmin
  auth:
    # Dev-only: bake fixed JWT/master keys so port-forward + curl
    # works out of the box and the seal/unseal across server +
    # runner agrees. Production should manage the secret out-of-
    # band via `existingSecret` and rotate via `helm upgrade`.
    create: true
    # 48-byte deterministic dev string (base64 of "dev-jwt-secret-please-rotate-...").
    jwtSecret: "ZGV2LWp3dC1zZWNyZXQtcGxlYXNlLXJvdGF0ZS1iZWZvcmUtcHJvZHVjdGlvbi11c2U="
    # 32-byte deterministic dev key (base64 of "dev-secrets-key-rotate-in-prod-").
    secretsKey: "ZGV2LXNlY3JldHMta2V5LXJvdGF0ZS1pbi1wcm9kLQ=="
    bootstrapAdminEmail: "admin@dev.local"

mongodb:
  enabled: true
  # Pin the subchart resource names so config.mongo.uri above resolves
  # regardless of the Helm release name. Without this, `helm install ci
  # ./charts/iterion -f values-dev.yaml` deploys the StatefulSet as
  # `ci-mongodb` while the iterion server still reads
  # `mongodb://iterion-mongodb-headless:27017` from the ConfigMap →
  # NXDOMAIN → /readyz never goes green. Same rationale for nats/minio
  # below.
  fullnameOverride: iterion-mongodb
  architecture: replicaset
  replicaCount: 1
  auth:
    enabled: false
  # Bitnami deprecated their public Docker Hub catalogue in 2025; the
  # versioned tags pinned by the subchart are now only published under
  # `bitnamilegacy/*`. Override the registry so kind can pull. Tracking
  # a longer-term move to an upstream image (mongo:8 official) but the
  # subchart's init scripts assume the bitnami layout for now.
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
nats:
  enabled: true
  fullnameOverride: iterion-nats
  config:
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        size: 1Gi
minio:
  enabled: true
  fullnameOverride: iterion-minio
  mode: standalone
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  defaultBuckets: iterion-artifacts
  # See mongodb.image note above — Bitnami deprecated docker.io/bitnami/*
  # in 2025; tags now live under bitnamilegacy/*.
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
