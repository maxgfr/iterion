# Default values for the iterion Helm chart. Documented inline so an
# operator skimming this file can size a deployment without cross-
# referencing the README. values-dev.yaml / values-prod.yaml override.

image:
  repository: ghcr.io/socialgouv/iterion
  tag: ""              # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --- Server (HTTP API + editor SPA) ---------------------------------
server:
  replicas: 1
  # Cloud-mode HTTP entry point — `iterion server` (T-30). Reads
  # ITERION_MODE + ITERION_MONGO_URI / ITERION_NATS_URL / ITERION_S3_*
  # from envFrom so no extra args are needed for the cloud wiring.
  #
  # Leave command empty so the image's ENTRYPOINT (`iterion`) stays
  # active. In Kubernetes `command:` overrides ENTRYPOINT (unlike
  # docker-compose where it overrides CMD), so passing ["server"]
  # would make kubelet exec a binary named `server` that doesn't
  # exist in the image. The args list below is appended to the
  # ENTRYPOINT, yielding `iterion server --port 4891 --bind 0.0.0.0`.
  command: []
  args:
    - "server"
    - "--port"
    - "4891"
    - "--bind"
    - "0.0.0.0"
  port: 4891
  metricsPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# --- Runner (workflow execution pool) -------------------------------
# The runner subcommand and NATS consumer are not yet implemented
# (T-25, T-27, T-29). When they land, set runner.enabled=true and
# the chart will deploy the pool with a KEDA ScaledObject keyed on
# JetStream lag.
runner:
  enabled: true
  replicas: 1
  # Same rationale as server.command above: keep command empty so the
  # image's `iterion` ENTRYPOINT runs and `args` becomes the subcommand.
  command: []
  args: ["runner"]
  # Prometheus metrics port for the runner. Defaults to the same
  # value as server.metricsPort to keep dashboards uniform; override
  # if your platform requires distinct ports per component.
  metricsPort: 9090
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 50
    cooldownPeriod: 60
    pollingInterval: 5
    lagThreshold: 1
    # JetStream consumer name. Override per-release in multi-tenant
    # installs to avoid collision when several iterion releases share
    # a NATS cluster.
    consumerName: iterion-runners
  # Sandbox toggle for the runner pod. When enabled, the chart
  # provisions the additional RBAC the runner needs to create per-run
  # sibling pods via the kubernetes sandbox driver (Phase 5 V1).
  # Disabled by default for clusters that haven't opted into the
  # sandbox feature; turn on per-environment via values-prod.yaml.
  sandbox:
    enabled: false

# --- HTTP exposure --------------------------------------------------
service:
  type: ClusterIP
  port: 4891
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations:
    # Long-running WS for the run console (event stream + log tail).
    # 1h matches the value the cloud-ready plan §H pins for parity
    # with the Cloud Run / nginx defaults seen in production.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: iterion.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# --- Mode + cloud dependencies --------------------------------------
mode: cloud   # "local" or "cloud"; "local" pins replicas=1 + PVC

config:
  log:
    format: json
    level: info
  mongo:
    uri: ""           # required when mode=cloud and mongodb.enabled=false
    database: iterion
    eventsTtlDays: 90
  nats:
    url: ""           # required when mode=cloud and nats.enabled=false
    # KEDA NATS JetStream scaler scrapes the HTTP monitoring endpoint
    # (default port 8222), NOT the client URL above. Format is
    # "host:port" — no scheme. When using the bundled nats sub-chart,
    # the default `<release>-nats:8222` works out of the box; with
    # external NATS, override here.
    monitoringEndpoint: ""
    stream: ITERION_RUNS
    kvBucket: iterion-run-locks
    dlqStream: ITERION_RUNS_DLQ
  s3:
    endpoint: ""      # required when mode=cloud and minio.enabled=false
    region: us-east-1
    bucket: iterion-artifacts
    usePathStyle: true
  runner:
    workdir: /tmp/iterion
    concurrency: 1
    heartbeat: 20s
    lockTtl: 60s
  # --- Auth (cloud only) -------------------------------------------
  # Public, non-secret half of the multitenant auth surface. The
  # secret half (JWT signing key, AES master key, OIDC client
  # secrets) lives in secrets.auth below.
  auth:
    # Externally reachable origin used to build OIDC redirect URIs
    # and as the CookieDomain default. Empty disables OIDC.
    publicUrl: ""
    # Cookie scoping. Empty = host-only (recommended). Set when
    # the SPA is served from a different host than the API.
    cookieDomain: ""
    cookieSecure: true
    # Access JWT lifetime. Refresh rotates on every use and lives
    # for refreshTtl.
    accessTtl: 15m
    refreshTtl: 720h
    # invite_only (default) requires an invitation token to register.
    # open allows public sign-up — provisions a personal team per
    # new user.
    signupMode: invite_only
    oidc:
      google:
        clientId: ""           # secret lives in secrets.auth.oidc.google
      github:
        clientId: ""
      generic:
        issuerUrl: ""          # https://idp.example/realms/iterion
        clientId: ""
        displayName: "SSO"
        scopes: "openid,email,profile"
    # OAuth-forfait (Phase D) — public client ids the server uses
    # to refresh user-supplied Claude Code / Codex subscription
    # tokens. Empty disables refresh of that kind (the user must
    # re-paste credentials.json on expiry).
    oauthForfait:
      anthropicClientId: ""
      codexClientId: ""

# --- Secrets --------------------------------------------------------
# Two opt-in patterns:
#   1. secrets.create=true: the chart renders a Secret with the
#      values you pass below. Convenient for local dev but
#      discouraged in prod (state in values.yaml or in the release
#      record).
#   2. secrets.existingSecret=<name>: reference an out-of-band
#      Secret you manage with sealed-secrets / external-secrets /
#      etc. The chart wires SecretKeyRef envFrom entries.
secrets:
  llm:
    create: false
    existingSecret: ""
    anthropicApiKey: ""
    openaiApiKey: ""
  storage:
    create: false
    existingSecret: ""
    s3AccessKeyId: ""
    s3SecretAccessKey: ""
  # Auth bundle for the cloud-mode HTTP API + JWT signing + BYOK seal.
  # The server pod refuses to boot in cloud mode without
  # ITERION_JWT_SECRET + ITERION_SECRETS_KEY set (override only via
  # ITERION_DISABLE_AUTH=true for smoke tests). Production should keep
  # create=false and reference an externally-managed Secret holding
  # the same env-var keys. Only rendered + wired in when mode=cloud.
  auth:
    create: false
    existingSecret: ""
    # Base64 of >=32 random bytes — `openssl rand -base64 48`
    jwtSecret: ""
    # Base64 of exactly 32 random bytes — `openssl rand -base64 32`
    secretsKey: ""
    # First-boot super-admin email. When set on an empty users
    # collection the server creates the account with a one-time
    # random password printed at WARN level in the boot logs. Leave
    # empty in established deployments where users have been
    # provisioned through the admin UI.
    bootstrapAdminEmail: ""
    # OIDC client_secrets. Public client_ids and discovery URLs go
    # into the ConfigMap (values.config.auth.oidc) — the secret
    # bundle only carries the secrets that should not be readable
    # by anyone with `kubectl get configmap`.
    oidc:
      google:
        enabled: false
        clientSecret: ""
      github:
        enabled: false
        clientSecret: ""
      generic:
        enabled: false
        clientSecret: ""

# --- Local-mode persistence (PVC for .iterion/) ---------------------
# Only consulted when mode=local. Cloud mode keeps state in Mongo+S3
# and the pod is ephemeral.
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClass: ""    # empty → cluster default
  annotations: {}

# --- Health probes --------------------------------------------------
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3

# --- Pod security ---------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}     # IRSA / Workload Identity annotations land here

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # node_modules + git index need rw

# --- Network policy (egress allowlist) ------------------------------
networkPolicy:
  enabled: false
  egress:
    # Chart users add their LLM endpoints, Mongo URI host, NATS host,
    # S3 endpoint host here. Empty list = deny-all egress (rarely
    # what you want; opt-out of NetworkPolicy entirely instead).
    extraAllow: []

# --- Observability --------------------------------------------------
metrics:
  enabled: false
  podMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    labels: {}

# --- Sub-charts (off by default; values-dev.yaml turns them on) ----
mongodb:
  enabled: false
  architecture: replicaset
  replicaCount: 1
  auth:
    enabled: false
nats:
  enabled: false
  config:
    jetstream:
      enabled: true
minio:
  enabled: false
  # Credentials intentionally left empty — values-dev.yaml supplies
  # the dev-only minioadmin/minioadmin pair. In prod set these via
  # an existing Secret referenced from secrets.storage.existingSecret.
  auth:
    rootUser: ""
    rootPassword: ""
  defaultBuckets: iterion-artifacts
