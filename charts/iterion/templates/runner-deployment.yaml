{{- if .Values.runner.enabled -}}
# The runner Deployment is rendered only when runner.enabled=true.
# The runner subcommand (T-29) and NATS consumer (T-25, T-27) must
# ship before this can be turned on in production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iterion.fullname" . }}-runner
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  {{- if not .Values.runner.keda.enabled }}
  replicas: {{ .Values.runner.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "iterion.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "iterion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      serviceAccountName: {{ include "iterion.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # SIGTERM grace: runner drains its in-flight run + republishes
      # to NATS before exiting (T-28).
      terminationGracePeriodSeconds: 90
      containers:
        - name: iterion-runner
          image: {{ include "iterion.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- with .Values.runner.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- toYaml .Values.runner.args | nindent 12 }}
          {{- if .Values.runner.sandbox.enabled }}
          # Downward API: ITERION_POD_IP is required for the kubernetes
          # sandbox driver's ProxyConfig() (pkg/sandbox/kubernetes), so
          # the network proxy advertises a routable address to sibling
          # sandbox pods. The "host.docker.internal" alias used by the
          # docker driver does not exist in pure k8s pod networking.
          env:
            - name: ITERION_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "iterion.fullname" . }}-config
            {{- if or .Values.secrets.llm.create .Values.secrets.llm.existingSecret }}
            - secretRef:
                name: {{ default (printf "%s-llm" (include "iterion.fullname" .)) .Values.secrets.llm.existingSecret }}
            {{- end }}
            {{- if or .Values.secrets.storage.create .Values.secrets.storage.existingSecret }}
            - secretRef:
                name: {{ default (printf "%s-storage" (include "iterion.fullname" .)) .Values.secrets.storage.existingSecret }}
            {{- end }}
            {{- if or .Values.secrets.auth.create .Values.secrets.auth.existingSecret }}
            # The runner needs ITERION_SECRETS_KEY (same value as
            # the server's) to unseal the per-run RunBundle that
            # cloudpublisher writes. Phase C+D.
            - secretRef:
                name: {{ default (printf "%s-auth" (include "iterion.fullname" .)) .Values.secrets.auth.existingSecret }}
            {{- end }}
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
          # The metrics listener is bound unconditionally by the runner
          # binary (the chart `metrics.enabled` flag only gates the
          # PodMonitor scrape config), so it doubles as a liveness probe
          # for the consume loop. Plan §F T-40.
          ports:
            - name: metrics
              containerPort: {{ default .Values.server.metricsPort .Values.runner.metricsPort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
{{- end -}}
