{{- if and (eq .Values.mode "cloud") .Values.secrets.smtp.create -}}
# SMTP credentials for transactional email (invitations, password
# resets). Host/port/from/startTLS are non-secret and live in the
# ConfigMap (values.config.smtp); only the relay credentials are here.
#
# Production deployments should keep create=false and reference an
# externally-managed Secret via secrets.smtp.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iterion.fullname" . }}-smtp
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.smtp.username }}
  ITERION_SMTP_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtp.password }}
  ITERION_SMTP_PASSWORD: {{ . | quote }}
  {{- end }}
{{- end }}
