{{- if .Values.secrets.session.create -}}
# Session secret consumed by the cloud server pod via envFrom. The
# server fails to boot in cloud mode without ITERION_SESSION_TOKEN
# set, so an operator who chooses `secrets.session.create=true` gets
# a working stack without managing the secret out-of-band. Production
# deployments should keep create=false and reference an external
# secret managed by sealed-secrets / external-secrets / etc.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iterion.fullname" . }}-session
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
type: Opaque
stringData:
  ITERION_SESSION_TOKEN: {{ .Values.secrets.session.token | quote }}
{{- end -}}
