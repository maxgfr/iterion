{{- if and (eq .Values.mode "cloud") .Values.secrets.auth.create -}}
# Auth secret bundle. Holds:
#   - ITERION_JWT_SECRET             — base64 of >=32 random bytes
#   - ITERION_SECRETS_KEY            — base64 of 32 random bytes (AES-256-GCM)
#   - ITERION_BOOTSTRAP_ADMIN_EMAIL  — first super-admin (one-time pw printed in logs)
#   - ITERION_OIDC_*_CLIENT_SECRET   — Google/GitHub/Generic OIDC client secrets
#
# Production deployments should keep create=false and reference an
# externally-managed Secret (sealed-secrets / external-secrets / a
# manually-applied Secret) via secrets.auth.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iterion.fullname" . }}-auth
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
type: Opaque
stringData:
  ITERION_JWT_SECRET: {{ required "secrets.auth.jwtSecret is required when secrets.auth.create=true" .Values.secrets.auth.jwtSecret | quote }}
  ITERION_SECRETS_KEY: {{ required "secrets.auth.secretsKey is required when secrets.auth.create=true" .Values.secrets.auth.secretsKey | quote }}
  {{- with .Values.secrets.auth.bootstrapAdminEmail }}
  ITERION_BOOTSTRAP_ADMIN_EMAIL: {{ . | quote }}
  {{- end }}
  {{- if .Values.secrets.auth.oidc.google.enabled }}
  ITERION_OIDC_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.auth.oidc.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.auth.oidc.github.enabled }}
  ITERION_OIDC_GITHUB_CLIENT_SECRET: {{ .Values.secrets.auth.oidc.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.auth.oidc.generic.enabled }}
  ITERION_OIDC_GENERIC_CLIENT_SECRET: {{ .Values.secrets.auth.oidc.generic.clientSecret | quote }}
  {{- end }}
{{- end -}}
