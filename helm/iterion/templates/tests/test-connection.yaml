apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "iterion.fullname" . }}-test-connection"
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  # Match the non-root + drop-all-caps profile applied to the workload
  # pods so OPA / PSA-restricted clusters accept `helm test` without
  # exempting the test namespace.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      command:
        - sh
        - -c
        - |
          set -e
          wget -qO- "http://{{ include "iterion.fullname" . }}:{{ .Values.service.port }}/healthz"
          echo
          wget -qO- "http://{{ include "iterion.fullname" . }}:{{ .Values.service.port }}/readyz"
