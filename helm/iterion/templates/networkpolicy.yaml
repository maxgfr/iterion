{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "iterion.fullname" . }}
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "iterion.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all in-cluster traffic to the server port; the Ingress
    # controller (or kubectl port-forward) is the public entry point.
    - ports:
        - port: {{ .Values.server.port }}
          protocol: TCP
        {{- if .Values.metrics.enabled }}
        - port: {{ .Values.server.metricsPort }}
          protocol: TCP
        {{- end }}
  egress:
    # Always allow DNS so service discovery resolves.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # In-cluster Mongo / NATS / S3-compatible gateway. Operators tune
    # selectors via networkPolicy.egress.extraAllow when targeting a
    # specific namespace or external CIDR.
    {{- with .Values.networkPolicy.egress.extraAllow }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
