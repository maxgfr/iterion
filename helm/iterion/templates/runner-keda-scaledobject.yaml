{{- if and .Values.runner.enabled .Values.runner.keda.enabled -}}
# KEDA scales the runner pool from JetStream consumer lag. Pulled
# only when runner.keda.enabled=true so the chart degrades gracefully
# on clusters without KEDA installed.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "iterion.fullname" . }}-runner
  labels:
    {{- include "iterion.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "iterion.fullname" . }}-runner
  pollingInterval: {{ .Values.runner.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.runner.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.runner.keda.minReplicas }}
  maxReplicaCount: {{ .Values.runner.keda.maxReplicas }}
  triggers:
    - type: nats-jetstream
      metadata:
        # KEDA scrapes /jsz on the NATS monitoring port (default 8222),
        # NOT the client URL. See _helpers.tpl for resolution order.
        natsServerMonitoringEndpoint: {{ include "iterion.nats.monitoringEndpoint" . | quote }}
        stream: {{ .Values.config.nats.stream | quote }}
        consumer: {{ default "iterion-runners" .Values.runner.keda.consumerName | quote }}
        lagThreshold: {{ .Values.runner.keda.lagThreshold | quote }}
{{- end -}}
