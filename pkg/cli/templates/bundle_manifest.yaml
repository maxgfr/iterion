name: my-bot
display_name: My Bot
version: 0.1.0
description: A packaged iterion workflow.
# when_to_use is the orchestrator-facing "use when" guidance — the same
# role as the "when to use it" line of a Claude Code skill. Nexie reads
# it (via the generated bot catalog) to decide whether to route a task
# to this bot. Keep it to a sentence or two; editable later from the
# studio Bot-metadata panel.
when_to_use: |
  Use when … (describe the situation this bot is the right pick for).
# enabled toggles whether this bot is advertised in the catalog exposed
# to Nexie + the board picker. Omit (or true) = visible; false = hidden
# (still editable in the studio Catalog manager, which can also override
# this per-workspace without touching the manifest).
enabled: true
schema_version: 1

# Optional: declare default attachments. Each entry maps an attachment
# name (matching the main.bot `attachments:` block) to a file inside
# this bundle's attachments/ directory.
#
# attachments:
#   logo: branding/logo.png
