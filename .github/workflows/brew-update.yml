name: 🍺 Brew tap update

# Runs after a GitHub Release is published — once for the CLI release.yml
# upload, again for desktop-release.yml. Both passes are idempotent: the
# second one regenerates identical values and the final `git diff --staged
# --quiet` check skips the commit. Re-running for the same tag is therefore
# safe and surfaces the desktop SHA only once it lands.
#
# `release: published` only fans out to other workflows if the release was
# created/edited with a non-`GITHUB_TOKEN` identity. Both release.yml and
# desktop-release.yml therefore call softprops/action-gh-release with a
# token-bureau App token; without that, this workflow stays silent.
#
# `workflow_dispatch` is exposed for backfill — pick a tag and re-run the
# tap update by hand without retagging.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to backfill (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write   # required by SocialGouv/token-bureau (OIDC exchange)

jobs:
  update:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Get GitHub App Token
        id: token
        uses: SocialGouv/token-bureau@main
        with:
          token-bureau-url: https://token-bureau.fabrique.social.gouv.fr
          audience: socialgouv

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.token.outputs.token }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # CLI binaries ship with .sha256 sidecars (see release.yml).
          # The desktop ZIP does not — update-brew-tap.sh computes the
          # hash locally when the sidecar is missing.
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir artifacts \
            --pattern 'iterion-darwin-*' \
            --pattern 'iterion-linux-*' \
            --pattern 'iterion-desktop-darwin-universal.zip'
          ls -la artifacts/

      - name: Update tap
        run: |
          VERSION="${TAG#v}"
          bash scripts/update-brew-tap.sh "$VERSION" artifacts

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/iterion.rb Cask/iterion-desktop.rb
          if git diff --staged --quiet; then
            echo "tap already up to date for ${TAG}, nothing to commit"
            exit 0
          fi
          git commit -m "chore(brew): update tap to ${TAG} [skip ci]"
          git push origin main
