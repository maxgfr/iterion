name: 📦 Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write   # required by SocialGouv/token-bureau (OIDC exchange)

jobs:
  build-binaries:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build editor frontend
        working-directory: editor
        run: |
          corepack enable
          pnpm install --prefer-offline
          pnpm exec vite build
          rm -rf ../pkg/server/static/assets ../pkg/server/static/index.html
          cp -r dist/* ../pkg/server/static/

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="iterion-${GOOS}-${GOARCH}${EXT}"
          VERSION="$(node -p "require('./package.json').version")"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Version=v${VERSION} -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Commit=${COMMIT}"
          go build -mod=vendor -trimpath -ldflags="${LDFLAGS}" -o "${OUTPUT}" ./cmd/iterion
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"
          else
            shasum -a 256 "${OUTPUT}" > "${OUTPUT}.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: iterion-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            iterion-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App Token
        id: token
        uses: SocialGouv/token-bureau@main
        with:
          token-bureau-url: https://token-bureau.fabrique.social.gouv.fr
          audience: socialgouv

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
          # GITHUB_TOKEN-created releases do not fire `release: published`
          # for downstream workflows (GitHub blocks the recursion). The
          # token-bureau App token bypasses that, letting brew-update.yml
          # pick the release up automatically.
          token: ${{ steps.token.outputs.token }}

  # No `needs:` — chart packaging is independent of the binary build, so
  # this job runs in parallel with build-binaries / release.
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute lowercase repo owner
        # OCI references must be lowercase; github.repository_owner preserves
        # case (e.g. SocialGouv → socialgouv).
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "REPO_LC=$(printf '%s' "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_ENV"

      - name: Package chart
        run: |
          helm dependency update charts/iterion
          helm package charts/iterion --destination dist/

      - name: Push chart to OCI
        run: |
          helm push dist/iterion-*.tgz "oci://ghcr.io/${REPO_LC}/charts"
