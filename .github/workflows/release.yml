name: 📦 Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write   # required by SocialGouv/token-bureau (OIDC exchange)

jobs:
  build-binaries:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build studio frontend
        working-directory: studio
        env:
          # macos-latest (M-series) only ships ~7 GB to a runner and
          # Node 22's default 2 GB old-space cap is too tight for the
          # vite production build (NodeIcon chunk pushes the heap past
          # the limit and v8 SIGABRTs). 4096 MiB clears the build with
          # headroom on every runner OS.
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          corepack enable
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec vite build
          rm -rf ../pkg/server/static/assets ../pkg/server/static/index.html
          cp -r dist/* ../pkg/server/static/

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="iterion-${GOOS}-${GOARCH}${EXT}"
          VERSION="$(node -p "require('./package.json').version")"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Version=v${VERSION} -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Commit=${COMMIT}"
          go build -mod=vendor -trimpath -ldflags="${LDFLAGS}" -o "${OUTPUT}" ./cmd/iterion
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"
          else
            shasum -a 256 "${OUTPUT}" > "${OUTPUT}.sha256"
          fi
          # Expose the resolved output filename to subsequent steps via
          # GITHUB_ENV so cosign + syft don't have to recompute it.
          echo "BIN=${OUTPUT}" >> "$GITHUB_ENV"

      # ─── Supply-chain attestation (Sprint-8 hardening) ─────────────
      # Only run on the linux/amd64 leg: SBOM is per-source, not per-
      # arch, so producing one artifact (rather than six copies) keeps
      # the release page tidy. The binary signatures themselves still
      # run on every matrix combination below.
      - name: Generate SBOM (syft, SPDX + CycloneDX)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: iterion-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SBOM (CycloneDX flavour)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: iterion-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binary (cosign keyless OIDC)
        # Keyless mode uses the GH Actions OIDC token issued under
        # `id-token: write` (already declared at workflow level), so no
        # private key is needed and the certificate is logged to the
        # public Rekor transparency log. Brew + AUR consumers can
        # verify with `cosign verify-blob --certificate <pem> \
        # --signature <sig> --certificate-identity-regexp ...`.
        run: |
          cosign sign-blob --yes "${BIN}" \
            --output-signature "${BIN}.sig" \
            --output-certificate "${BIN}.pem"

      - uses: actions/upload-artifact@v7
        with:
          name: iterion-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            iterion-${{ matrix.goos }}-${{ matrix.goarch }}*
            iterion-sbom.spdx.json
            iterion-sbom.cdx.json

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App Token
        id: token
        uses: SocialGouv/token-bureau@main
        with:
          token-bureau-url: https://token-bureau.fabrique.social.gouv.fr
          audience: socialgouv

      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
          # GITHUB_TOKEN-created releases do not fire `release: published`
          # for downstream workflows (GitHub blocks the recursion). The
          # token-bureau App token bypasses that, letting brew-update.yml
          # pick the release up automatically.
          token: ${{ steps.token.outputs.token }}

  # No `needs:` — chart packaging is independent of the binary build, so
  # this job runs in parallel with build-binaries / release.
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless OIDC
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v4

      - name: Login to GHCR (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to GHCR (docker, for cosign)
        # `helm registry login` stores creds in ~/.config/helm/registry
        # which cosign does not read. cosign sign uploads the signature
        # via the OCI distribution spec and looks up creds in
        # ~/.docker/config.json — without this step it 401s on push.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repo owner
        # OCI references must be lowercase; github.repository_owner preserves
        # case (e.g. SocialGouv → socialgouv).
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "REPO_LC=$(printf '%s' "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_ENV"

      - name: Package chart
        run: |
          helm dependency update charts/iterion
          helm package charts/iterion --destination dist/

      - name: Push chart to OCI
        id: chart-push
        # Capture the push output so we can resolve the digest for
        # cosign — `helm push` prints `Digest: sha256:...` to stderr
        # which we tee into a temp file.
        run: |
          set -euo pipefail
          OUT=$(helm push dist/iterion-*.tgz "oci://ghcr.io/${REPO_LC}/charts" 2>&1 | tee /dev/stderr)
          DIGEST=$(printf '%s\n' "$OUT" | awk '/^Digest:/ {print $2}')
          VERSION=$(ls dist/iterion-*.tgz | sed -E 's|.*iterion-(.*)\.tgz|\1|')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign chart OCI artifact (cosign keyless)
        # OCI references must point at the digest, not the tag, so a
        # later re-push under the same version can't claim our signature.
        run: |
          cosign sign --yes \
            "ghcr.io/${REPO_LC}/charts/iterion@${DIGEST}"
        env:
          DIGEST: ${{ steps.chart-push.outputs.digest }}
