name: 📦 Desktop Release

# Triggers on the same v* tags as release.yml. The two workflows run in
# parallel and attach distinct (iterion-* vs iterion-desktop-*) artefacts
# to the same GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin/arm64
            artifact_name: iterion-desktop-darwin-arm64
            package: zip
          - os: macos-13
            platform: darwin/amd64
            artifact_name: iterion-desktop-darwin-amd64
            package: zip
          - os: windows-latest
            platform: windows/amd64
            artifact_name: iterion-desktop-windows-amd64
            package: nsis-portable
          - os: windows-latest
            platform: windows/arm64
            artifact_name: iterion-desktop-windows-arm64
            package: nsis-portable
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: iterion-desktop-linux-amd64
            package: appimage
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            artifact_name: iterion-desktop-linux-arm64
            package: appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Linux deps
        if: startsWith(matrix.platform, 'linux/')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libfuse2 patchelf desktop-file-utils \
            wget xxd

      - name: Install AppImage tooling
        if: matrix.package == 'appimage'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            linux/amd64) tool_arch="x86_64" ;;
            linux/arm64) tool_arch="aarch64" ;;
            *) echo "Unsupported AppImage platform: ${{ matrix.platform }}" >&2; exit 1 ;;
          esac
          wget -qO /usr/local/bin/linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${tool_arch}.AppImage"
          chmod +x /usr/local/bin/linuxdeploy
          wget -qO /usr/local/bin/linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x /usr/local/bin/linuxdeploy-plugin-gtk

      - name: Build editor frontend
        working-directory: editor
        shell: bash
        run: |
          corepack enable
          pnpm install --prefer-offline
          pnpm exec vite build
          rm -rf ../pkg/server/static/assets ../pkg/server/static/index.html
          cp -r dist/* ../pkg/server/static/

      - name: Build desktop binary
        shell: bash
        env:
          GOOS_GOARCH: ${{ matrix.platform }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PACKAGE: ${{ matrix.package }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Version=v${VERSION} -X github.com/SocialGouv/iterion/pkg/internal/appinfo.Commit=${COMMIT}"
          EXTRA=""
          if [ "$PACKAGE" = "nsis-portable" ]; then
            EXTRA="-nsis"
          fi
          wails build -tags desktop -platform "$GOOS_GOARCH" -clean -trimpath -ldflags "$LDFLAGS" $EXTRA

      - name: Package
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PACKAGE: ${{ matrix.package }}
        run: |
          set -e
          case "$PACKAGE" in
            zip)
              # macOS: ditto preserves xattrs/symlinks inside .app
              cd build/bin
              ditto -c -k --keepParent Iterion.app "../../${ARTIFACT_NAME}.zip"
              cd ../..
              ;;
            nsis-portable)
              cp build/bin/iterion-desktop.exe "${ARTIFACT_NAME}.exe"
              # Wails NSIS produces *-installer.exe in build/bin; copy if present.
              for f in build/bin/*-installer.exe; do
                [ -f "$f" ] && cp "$f" "${ARTIFACT_NAME}-installer.exe"
              done
              ;;
            appimage)
              ARCH="${ARTIFACT_NAME##*-}"
              ./scripts/desktop/build-appimage.sh "$ARCH"
              ;;
          esac

      - name: Smoke check Linux AppImage architecture
        if: matrix.package == 'appimage'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          appimage="${ARTIFACT_NAME}.AppImage"
          test -s "$appimage"
          file "$appimage"
          # AppImages are self-extracting ELF launchers; verify the runtime
          # header itself is for the requested CPU before signing/uploading.
          case "$PLATFORM" in
            linux/amd64) expected="Advanced Micro Devices X86-64" ;;
            linux/arm64) expected="AArch64" ;;
            *) echo "Unsupported Linux platform: $PLATFORM" >&2; exit 1 ;;
          esac
          readelf -h "$appimage" | tee appimage-elf-header.txt
          readelf -h "$appimage" | grep -q "Machine:.*${expected}"
          if [ "$PLATFORM" = "linux/arm64" ]; then
            chmod +x "$appimage"
            "$appimage" --appimage-help >/dev/null
          fi

      - name: Verify updater signing secret
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
        shell: bash
        run: |
          if [ -z "$UPDATER_ED25519_PRIVATE" ]; then
            echo "UPDATER_ED25519_PRIVATE is required for desktop releases; without it the auto-updater manifest and artefact signatures cannot be produced." >&2
            exit 1
          fi

      - name: Sign artefacts (Ed25519)
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        shell: bash
        run: |
          shopt -s nullglob
          ./scripts/desktop/sign-release.sh ${ARTIFACT_NAME}*

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: warn
          path: |
            ${{ matrix.artifact_name }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: Verify updater signing secret
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
        shell: bash
        run: |
          if [ -z "$UPDATER_ED25519_PRIVATE" ]; then
            echo "UPDATER_ED25519_PRIVATE is required for desktop releases; without it the auto-updater manifest and signatures cannot be produced." >&2
            exit 1
          fi

      - name: Generate manifest
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
          VERSION: ${{ github.ref_name }}
        run: ./scripts/desktop/generate-manifest.sh artefacts

      - name: Attach artefacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artefacts/iterion-desktop-*
          fail_on_unmatched_files: false
