name: 📦 Desktop Release

# Triggers on the same v* tags as release.yml. The two workflows run in
# parallel and attach distinct (iterion-* vs iterion-desktop-*) artefacts
# to the same GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Tag pushes serialise (we never want a v1.2.0 build to clobber a still
  # running v1.1.0 release), but manual workflow_dispatch invocations
  # cancel the previous one — typical iteration flow during desktop
  # packaging troubleshooting.
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin/arm64
            artifact_name: iterion-desktop-darwin-arm64
            package: zip
          - os: macos-13
            platform: darwin/amd64
            artifact_name: iterion-desktop-darwin-amd64
            package: zip
          - os: windows-latest
            platform: windows/amd64
            artifact_name: iterion-desktop-windows-amd64
            package: nsis-portable
          - os: windows-latest
            platform: windows/arm64
            artifact_name: iterion-desktop-windows-arm64
            package: nsis-portable
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: iterion-desktop-linux-amd64
            package: appimage
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            artifact_name: iterion-desktop-linux-arm64
            package: appimage
    runs-on: ${{ matrix.os }}
    env:
      # Allow Go to auto-download a newer toolchain when go.mod's `go`
      # directive bumps past the preinstalled version on the runner. With
      # GOTOOLCHAIN=local (setup-go default), `go build` would refuse to
      # run instead of fetching the requested toolchain.
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Pin to the major Go version our go.mod requires. setup-go's
          # go-version-file mode can fall back to a runner-preinstalled Go
          # when the exact version isn't in its tool cache, and that
          # silently lands us on a Go too old for go.mod's `go 1.26.0`.
          go-version: "1.26"
          check-latest: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Linux deps
        if: startsWith(matrix.platform, 'linux/')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev libfuse2 patchelf desktop-file-utils dpkg-dev \
            librsvg2-common gtk-update-icon-cache wget xxd

      - name: Install AppImage tooling
        if: matrix.package == 'appimage'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            linux/amd64) tool_arch="x86_64" ;;
            linux/arm64) tool_arch="aarch64" ;;
            *) echo "Unsupported AppImage platform: ${{ matrix.platform }}" >&2; exit 1 ;;
          esac
          sudo wget -qO /usr/local/bin/linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${tool_arch}.AppImage"
          sudo chmod +x /usr/local/bin/linuxdeploy
          sudo wget -qO /usr/local/bin/linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          sudo chmod +x /usr/local/bin/linuxdeploy-plugin-gtk

      - name: Install go-task
        shell: bash
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enable corepack
        shell: bash
        run: |
          # Node 22+ ships Corepack disabled by default; `corepack pnpm`
          # commands silently fail without this on Windows runners. Linux
          # and macOS runners typically have it pre-enabled, but running
          # this is a no-op on those.
          corepack enable
          # `packageManager` field lives in the root package.json (the
          # workspace anchor), not editor/package.json. Pre-activating
          # caches the pinned pnpm version so the editor build step's
          # first `corepack pnpm install` runs offline against a warm
          # shim instead of triggering a network fetch on Windows.
          PNPM_VERSION="$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")"
          corepack prepare --activate "pnpm@${PNPM_VERSION}"

      - name: Build editor frontend
        shell: bash
        working-directory: editor
        run: |
          # Cross-platform inline of the editor:build Taskfile target.
          # On Windows runners go-task v3 falls back to mvdan/sh for POSIX
          # commands, but the corepack shim resolution + pnpm version
          # download under that shim has been flaky on the windows-2025
          # image; running the steps directly under Git Bash sidesteps the
          # extra shell layer.
          corepack pnpm install --prefer-offline
          corepack pnpm exec vite build
          rm -rf ../pkg/server/static/assets ../pkg/server/static/index.html
          cp -r dist/* ../pkg/server/static/

      - name: Build desktop binary
        shell: bash
        env:
          GOOS_GOARCH: ${{ matrix.platform }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PACKAGE: ${{ matrix.package }}
        run: |
          # The Taskfile pins -tags desktop,webkit2_41 (Linux), -skipbindings,
          # -s (we ship a stub frontend, the real SPA is embedded in pkg/server)
          # and runs wails build from cmd/iterion-desktop where wails.json lives.
          case "$GOOS_GOARCH" in
            linux/amd64)   task desktop:build:linux:amd64 ;;
            linux/arm64)   task desktop:build:linux:arm64 ;;
            darwin/amd64)  task desktop:build:darwin:amd64 ;;
            darwin/arm64)  task desktop:build:darwin:arm64 ;;
            windows/amd64) task desktop:build:windows:amd64 ;;
            windows/arm64) task desktop:build:windows:arm64 ;;
            *) echo "Unsupported platform: $GOOS_GOARCH" >&2; exit 1 ;;
          esac

      - name: Package
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PACKAGE: ${{ matrix.package }}
        run: |
          set -e
          case "$PACKAGE" in
            zip)
              # macOS: ditto preserves xattrs/symlinks inside .app
              cd build/bin
              ditto -c -k --keepParent Iterion.app "../../${ARTIFACT_NAME}.zip"
              cd ../..
              ;;
            nsis-portable)
              cp build/bin/iterion-desktop.exe "${ARTIFACT_NAME}.exe"
              # Wails NSIS produces *-installer.exe in build/bin; copy if present.
              for f in build/bin/*-installer.exe; do
                [ -f "$f" ] && cp "$f" "${ARTIFACT_NAME}-installer.exe"
              done
              ;;
            appimage)
              ARCH="${ARTIFACT_NAME##*-}"
              ./scripts/desktop/build-appimage.sh "$ARCH"
              ;;
          esac

      - name: Bundle Linux raw binary tarball
        if: matrix.package == 'appimage'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          # Ship the raw binary alongside the AppImage. ~46 MB instead of
          # ~110 MB; users on glibc >= 2.35 distros that already have
          # libgtk-3 + libwebkit2gtk-4.1 + libsoup-3.0 (Mint 21+, Ubuntu
          # 22.04+, Debian 12+, Fedora 38+, Pop!_OS 22.04+) can run it
          # directly without unpacking an AppImage. Distro packagers can
          # also pick the binary up from the tarball when assembling
          # `.deb`/`.rpm`.
          stage="$(mktemp -d)"
          cp "build/bin/${ARTIFACT_NAME}" "$stage/iterion-desktop"
          chmod +x "$stage/iterion-desktop"
          cp build/linux/iterion.desktop "$stage/iterion-desktop.desktop"
          [ -f build/appicon.png ] && cp build/appicon.png "$stage/iterion-desktop.png"
          cat > "$stage/README.md" <<'EOF'
          # Iterion Desktop — raw Linux binary

          The same binary that powers the AppImage, distributed without
          its bundled WebKitGTK runtime so it stays small (~46 MB vs
          ~110 MB) and integrates with your distro's libraries.

          ## System requirements

          glibc >= 2.35 plus the WebKitGTK 4.1 runtime stack. On
          Debian/Ubuntu/Mint/Pop!_OS:

              sudo apt install libgtk-3-0 libwebkit2gtk-4.1-0 libsoup-3.0-0

          On Fedora/RHEL:

              sudo dnf install gtk3 webkit2gtk4.1 libsoup3

          ## Run

              chmod +x iterion-desktop
              ./iterion-desktop

          ## Install system-wide (optional)

              sudo install -Dm755 iterion-desktop /usr/local/bin/iterion-desktop
              sudo install -Dm644 iterion-desktop.desktop \
                  /usr/share/applications/iterion-desktop.desktop
              sudo install -Dm644 iterion-desktop.png \
                  /usr/share/icons/hicolor/256x256/apps/iterion-desktop.png
              sudo gtk-update-icon-cache /usr/share/icons/hicolor

          ## Need a self-contained launcher instead?

          Use the `iterion-desktop-linux-<arch>.AppImage` artefact from
          the same release. No system dependencies, single executable.
          EOF
          tar -C "$stage" -czf "${ARTIFACT_NAME}.tar.gz" .
          rm -rf "$stage"
          ls -la "${ARTIFACT_NAME}.tar.gz"

      - name: Smoke check Linux AppImage architecture
        if: matrix.package == 'appimage'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          appimage="${ARTIFACT_NAME}.AppImage"
          test -s "$appimage"
          file "$appimage"
          # AppImages are self-extracting ELF launchers; verify the
          # runtime header is for the requested CPU before signing &
          # uploading. We deliberately stop at the ELF check — running
          # `--appimage-help` against the inner Wails binary would just
          # forward the flag (it isn't a recognised iterion-desktop CLI
          # arg) and the FUSE-less Ubuntu 24.04 runners can't mount the
          # outer AppImage anyway. ELF arch + non-zero size is enough to
          # catch the regression that historically motivated this step
          # (a wrong-arch linuxdeploy producing an x86_64 wrapper around
          # an aarch64 binary).
          case "$PLATFORM" in
            linux/amd64) expected="Advanced Micro Devices X86-64" ;;
            linux/arm64) expected="AArch64" ;;
            *) echo "Unsupported Linux platform: $PLATFORM" >&2; exit 1 ;;
          esac
          readelf -h "$appimage" | tee appimage-elf-header.txt
          readelf -h "$appimage" | grep -q "Machine:.*${expected}"

      - name: Verify updater signing secret
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
        shell: bash
        run: |
          if [ -z "$UPDATER_ED25519_PRIVATE" ]; then
            echo "UPDATER_ED25519_PRIVATE is required for desktop releases; without it the auto-updater manifest and artefact signatures cannot be produced." >&2
            exit 1
          fi

      - name: Sign artefacts (Ed25519)
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        shell: bash
        run: |
          shopt -s nullglob
          ./scripts/desktop/sign-release.sh ${ARTIFACT_NAME}*

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: warn
          path: |
            ${{ matrix.artifact_name }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artefacts
          merge-multiple: true

      - name: Verify updater signing secret
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
        shell: bash
        run: |
          if [ -z "$UPDATER_ED25519_PRIVATE" ]; then
            echo "UPDATER_ED25519_PRIVATE is required for desktop releases; without it the auto-updater manifest and signatures cannot be produced." >&2
            exit 1
          fi

      - name: Generate manifest
        env:
          UPDATER_ED25519_PRIVATE: ${{ secrets.UPDATER_ED25519_PRIVATE }}
          VERSION: ${{ github.ref_name }}
        run: ./scripts/desktop/generate-manifest.sh artefacts

      - name: Attach artefacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artefacts/iterion-desktop-*
          fail_on_unmatched_files: false
