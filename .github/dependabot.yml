version: 2

# Dependabot keeps the five ecosystems iterion ships across in sync.
# All groups are weekly to avoid PR noise; minor + patch are grouped
# per ecosystem so a single review covers the routine bumps.

updates:
  # Go modules at the repo root.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # Root package.json (release-it + tooling).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      npm-root-minor-patch:
        update-types:
          - minor
          - patch

  # Editor SPA dependencies (the big one).
  - package-ecosystem: npm
    directory: /editor
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      editor-minor-patch:
        update-types:
          - minor
          - patch

  # Helm chart sub-charts (mongo, nats, minio).
  - package-ecosystem: helm
    directory: /charts/iterion
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # GitHub Actions across .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Dockerfile base images (server + sandbox variants).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
